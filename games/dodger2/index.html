<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no" />
<title>3v3 卡牌對決 Demo v2</title>
<style>
  :root{
    --bg:#0d1020;
    --panel:#171c31;
    --panel2:#232947;
    --line:#313a64;
    --text:#eef2ff;
    --muted:#a3add8;
    --player:#7dd3fc;
    --enemy:#f9a8d4;
    --gold:#fcd34d;
    --select:#a78bfa;
    --empty:#8b95ba;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;height:100%;
    background:linear-gradient(180deg,#101427,#0b0e19 60%,#080a11);
    color:var(--text);
    font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;
    overflow:hidden;
  }
  body{position:fixed; inset:0;}
  .app{
    height:100dvh;
    padding:
      calc(env(safe-area-inset-top) + 10px)
      calc(env(safe-area-inset-right) + 10px)
      calc(env(safe-area-inset-bottom) + 10px)
      calc(env(safe-area-inset-left) + 10px);
    display:grid;
    grid-template-rows:auto auto auto 1fr auto;
    gap:8px;
    max-width:560px;
    margin:0 auto;
  }
  .box{
    background:rgba(23,28,49,.94);
    border:1px solid var(--line);
    border-radius:18px;
  }
  .topbar{
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .title{
    font-size:20px;
    font-weight:1000;
    letter-spacing:.3px;
  }
  .sub{
    margin-top:3px;
    font-size:12px;
    color:var(--muted);
  }
  .turn-pill{
    min-width:114px;
    text-align:center;
    padding:10px 12px;
    border-radius:999px;
    background:rgba(125,211,252,.1);
    border:1px solid rgba(125,211,252,.24);
    font-size:13px;
    font-weight:900;
  }
  .status{
    padding:10px 12px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    font-size:13px;
    gap:10px;
  }
  .status b{font-size:15px}
  .status .center{
    text-align:center;
    color:var(--gold);
    font-weight:900;
  }
  .actionbar{
    padding:12px 14px;
    min-height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:15px;
    font-weight:900;
    letter-spacing:.2px;
  }
  .actionbar small{
    display:block;
    margin-top:4px;
    font-size:12px;
    color:var(--muted);
    font-weight:700;
  }
  .board{
    min-height:0;
    display:grid;
    grid-template-rows:auto auto auto auto auto;
    gap:8px;
  }
  .reserve-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:2px 2px 4px;
    scrollbar-width:none;
  }
  .reserve-row::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;
    min-width:54px;
    height:38px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    font-weight:1000;
    border:1px solid var(--line);
    background:rgba(35,41,71,.94);
    color:#dde5ff;
    transition:transform .22s ease, opacity .22s ease;
  }
  .chip.enemy{background:rgba(72,37,54,.92)}
  .chip.player{background:rgba(27,60,72,.94)}
  .chip.drawn{
    transform:scale(1.15);
    box-shadow:0 0 0 3px rgba(252,211,77,.22);
  }
  .field{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .midbar{
    padding:8px 10px;
    border-radius:16px;
    border:1px dashed rgba(255,255,255,.12);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:var(--muted);
  }
  .midbar .big{
    color:#e8ecff;
    font-weight:900;
  }
  .card{
    position:relative;
    min-height:136px;
    border-radius:20px;
    border:2px solid var(--line);
    background:
      radial-gradient(circle at top, rgba(255,255,255,.08), transparent 40%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      var(--panel);
    box-shadow:0 10px 22px rgba(0,0,0,.24);
    padding:10px 8px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    transition:transform .28s ease, opacity .28s ease, border-color .18s ease, box-shadow .18s ease, filter .24s ease;
    user-select:none;
  }
  .player-card{
    background:
      radial-gradient(circle at top, rgba(125,211,252,.14), transparent 40%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      #17283a;
  }
  .enemy-card{
    background:
      radial-gradient(circle at top, rgba(249,168,212,.14), transparent 40%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      #2a1d2a;
  }
  .card.selectable{border-color:rgba(125,211,252,.45)}
  .card.selected{
    border-color:var(--select);
    box-shadow:0 0 0 3px rgba(167,139,250,.25),0 10px 22px rgba(0,0,0,.24);
  }
  .card.targetable{
    border-color:rgba(252,211,77,.55);
    box-shadow:0 0 0 3px rgba(252,211,77,.18),0 10px 22px rgba(0,0,0,.24);
  }
  .card.attacking.player-card{ transform:translateY(-16px) scale(1.03); }
  .card.attacking.enemy-card{ transform:translateY(16px) scale(1.03); }
  .card.hit{
    box-shadow:0 0 0 4px rgba(252,211,77,.25), 0 10px 22px rgba(0,0,0,.24);
    filter:brightness(1.16);
  }
  .card.dying{
    transform:scale(.84);
    opacity:.08;
    filter:grayscale(1);
  }
  .card.entering{
    animation:flipIn .45s ease;
    border-color:rgba(252,211,77,.5);
  }
  @keyframes flipIn{
    0%{ transform:rotateY(90deg) scale(.9); opacity:.15; }
    100%{ transform:rotateY(0) scale(1); opacity:1; }
  }
  .card .kind{
    width:100%;
    text-align:center;
    font-size:11px;
    color:var(--muted);
    font-weight:800;
  }
  .card .power{
    font-size:42px;
    line-height:1;
    font-weight:1000;
    letter-spacing:.5px;
  }
  .meta{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    justify-content:center;
  }
  .tag{
    padding:4px 8px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    font-size:11px;
    color:#d8e0ff;
  }
  .dead-slot{
    min-height:136px;
    border-radius:20px;
    border:2px dashed rgba(255,255,255,.18);
    background:rgba(255,255,255,.03);
    color:var(--empty);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:8px;
    opacity:.94;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
  }
  .dead-slot .x{
    font-size:34px;
    font-weight:1000;
    line-height:1;
  }
  .dead-slot .txt{
    font-size:12px;
    font-weight:800;
  }
  .toolbar{
    padding:9px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  button{
    appearance:none;border:none;
    height:48px;border-radius:16px;
    color:#eef2ff;
    font-size:15px;font-weight:1000;
    background:linear-gradient(180deg,#2c3459,#242a49);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 10px 18px rgba(0,0,0,.18);
  }
  button:active{ transform:scale(.985); }
</style>
</head>
<body>
<div class="app">
  <div class="box topbar">
    <div>
      <div class="title">3v3 卡牌對決</div>
      <div class="sub">先點我方一張，再點敵方一張。現在有明顯動作流程。</div>
    </div>
    <div class="turn-pill" id="turnPill">你的回合</div>
  </div>

  <div class="box status">
    <div>我方牌堆：<b id="playerReserveCount">3</b></div>
    <div class="center" id="roundText">第 1 回合</div>
    <div style="text-align:right">敵方牌堆：<b id="enemyReserveCount">3</b></div>
  </div>

  <div class="box actionbar" id="actionBar">先選你要攻擊的卡<small>這裡只顯示當前動作，不塞一大堆戰報。</small></div>

  <div class="board">
    <div class="reserve-row" id="enemyReserve"></div>
    <div class="field" id="enemyField"></div>
    <div class="midbar">
      <span id="centerHint">等待出手</span>
      <span class="big" id="scoreText">我方 6 vs 敵方 6</span>
    </div>
    <div class="field" id="playerField"></div>
    <div class="reserve-row" id="playerReserve"></div>
  </div>

  <div class="box toolbar">
    <button id="newPresetBtn">用範例牌組重開</button>
    <button id="newRandomBtn">隨機牌組重開</button>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  const state = {
    playerField: [],
    enemyField: [],
    playerReserve: [],
    enemyReserve: [],
    turn: 'player',
    selectedPlayerIndex: null,
    busy: false,
    winner: null,
    round: 1,
    animate: {
      attacking: null,
      hit: null,
      dying: [],
      entering: []
    }
  };

  const el = {
    turnPill: $('turnPill'),
    roundText: $('roundText'),
    actionBar: $('actionBar'),
    centerHint: $('centerHint'),
    scoreText: $('scoreText'),
    playerReserveCount: $('playerReserveCount'),
    enemyReserveCount: $('enemyReserveCount'),
    playerReserve: $('playerReserve'),
    enemyReserve: $('enemyReserve'),
    playerField: $('playerField'),
    enemyField: $('enemyField'),
    newPresetBtn: $('newPresetBtn'),
    newRandomBtn: $('newRandomBtn')
  };

  let nextId = 1;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function setAction(text, sub=''){
    el.actionBar.innerHTML = sub ? `${text}<small>${sub}</small>` : text;
  }

  function makeCard(value, side, kind='一般'){
    return { id: nextId++, value, base: value, side, kind };
  }

  function makePresetDecks(){
    return {
      player: [200,150,180,120,240,90],
      enemy:  [300,100,130,170,220,140]
    };
  }

  function makeRandomDecks(){
    const gen = () => Array.from({length:6}, () => Math.floor(Math.random() * 25) * 10 + 80);
    return { player: gen(), enemy: gen() };
  }

  function sideName(side){ return side === 'player' ? '我方' : '敵方'; }
  function getField(side){ return side === 'player' ? state.playerField : state.enemyField; }
  function getReserve(side){ return side === 'player' ? state.playerReserve : state.enemyReserve; }
  function setField(side, v){ side === 'player' ? state.playerField = v : state.enemyField = v; }
  function setReserve(side, v){ side === 'player' ? state.playerReserve = v : state.enemyReserve = v; }

  function totalAliveCount(side){
    return getField(side).filter(Boolean).length + getReserve(side).length;
  }

  function clearSelection(){ state.selectedPlayerIndex = null; }

  function judgeWinner(){
    const p = totalAliveCount('player');
    const e = totalAliveCount('enemy');

    if(p <= 0 && e <= 0) state.winner = 'draw';
    else if(p <= 0) state.winner = 'enemy';
    else if(e <= 0) state.winner = 'player';

    if(state.winner){
      state.turn = null;
      state.selectedPlayerIndex = null;
      state.busy = true;
      if(state.winner === 'draw'){
        setAction('雙方同歸於盡，平手', '這把直接玉石俱焚。');
      }else{
        setAction(state.winner === 'player' ? '你贏了' : '你輸了', '可以直接重開一把。');
      }
    }
  }

  function renderReserve(container, cards, side){
    container.innerHTML = '';
    if(cards.length === 0){
      const chip = document.createElement('div');
      chip.className = `chip ${side}`;
      chip.textContent = '空';
      chip.style.opacity = '.55';
      container.appendChild(chip);
      return;
    }
    cards.forEach((card, idx) => {
      const chip = document.createElement('div');
      chip.className = `chip ${side}`;
      chip.textContent = card.value;
      chip.title = `${card.kind} ${card.value}`;
      if(state.animate.entering.some(x => x.side === side && x.fromReserveIndex === idx)) chip.classList.add('drawn');
      container.appendChild(chip);
    });
  }

  function deadSlotHTML(){
    return `<div class="dead-slot"><div class="x">✕</div><div class="txt">空位</div></div>`;
  }

  function renderField(container, cards, side){
    container.innerHTML = '';

    cards.forEach((card, idx) => {
      const dyingHere = state.animate.dying.some(x => x.side === side && x.index === idx);

      if(!card){
        container.insertAdjacentHTML('beforeend', deadSlotHTML());
        return;
      }

      const d = document.createElement('button');
      d.type = 'button';
      d.className = `card ${side === 'player' ? 'player-card' : 'enemy-card'}`;

      const playerTurn = state.turn === 'player' && !state.busy && !state.winner;

      if(side === 'player' && playerTurn){
        d.classList.add('selectable');
        if(state.selectedPlayerIndex === idx) d.classList.add('selected');
        d.addEventListener('click', () => {
          state.selectedPlayerIndex = idx;
          render();
        });
      }

      if(side === 'enemy' && playerTurn && state.selectedPlayerIndex !== null){
        d.classList.add('targetable');
        d.addEventListener('click', () => {
          if(state.selectedPlayerIndex === null) return;
          resolveAttack('player', state.selectedPlayerIndex, idx);
        });
      }

      if(state.animate.attacking && state.animate.attacking.side === side && state.animate.attacking.index === idx){
        d.classList.add('attacking');
      }
      if(state.animate.hit && state.animate.hit.side === side && state.animate.hit.index === idx){
        d.classList.add('hit');
      }
      if(dyingHere){
        d.classList.add('dying');
      }
      if(state.animate.entering.some(x => x.side === side && x.index === idx)){
        d.classList.add('entering');
      }

      d.innerHTML = `
        <div class="kind">${card.kind}</div>
        <div class="power">${card.value}</div>
        <div class="meta">
          <span class="tag">攻擊 = 血量</span>
          <span class="tag">原始 ${card.base}</span>
        </div>
      `;
      container.appendChild(d);
    });
  }

  function render(){
    el.playerReserveCount.textContent = state.playerReserve.length;
    el.enemyReserveCount.textContent = state.enemyReserve.length;
    el.roundText.textContent = `第 ${state.round} 回合`;

    const playerTotal = totalAliveCount('player');
    const enemyTotal = totalAliveCount('enemy');
    el.scoreText.textContent = `我方 ${playerTotal} vs 敵方 ${enemyTotal}`;

    if(state.winner === 'player') el.turnPill.textContent = '你贏了';
    else if(state.winner === 'enemy') el.turnPill.textContent = '你輸了';
    else if(state.winner === 'draw') el.turnPill.textContent = '平手';
    else el.turnPill.textContent = state.turn === 'player' ? '你的回合' : '對方回合';

    if(state.winner){
      el.centerHint.textContent = '對局結束';
    }else if(state.turn === 'enemy'){
      el.centerHint.textContent = '對方出手中';
    }else if(state.selectedPlayerIndex === null){
      el.centerHint.textContent = '先選我方卡';
    }else{
      el.centerHint.textContent = '再選敵方目標';
    }

    renderReserve(el.enemyReserve, state.enemyReserve, 'enemy');
    renderReserve(el.playerReserve, state.playerReserve, 'player');
    renderField(el.enemyField, state.enemyField, 'enemy');
    renderField(el.playerField, state.playerField, 'player');
  }

  function setupGame(randomMode){
    nextId = 1;
    state.turn = 'player';
    state.selectedPlayerIndex = null;
    state.busy = false;
    state.winner = null;
    state.round = 1;
    state.animate = { attacking:null, hit:null, dying:[], entering:[] };

    const decks = randomMode ? makeRandomDecks() : makePresetDecks();
    const p = decks.player.map(v => makeCard(v, 'player'));
    const e = decks.enemy.map(v => makeCard(v, 'enemy'));

    state.playerField = p.slice(0, 3);
    state.enemyField = e.slice(0, 3);
    state.playerReserve = p.slice(3);
    state.enemyReserve = e.slice(3);

    setAction('新對局開始', `我方：${decks.player.join(' / ')}　敵方：${decks.enemy.join(' / ')}`);
    render();
  }

  async function refillSideAnimated(side){
    const field = [...getField(side)];
    const reserve = [...getReserve(side)];

    for(let i = 0; i < field.length; i++){
      if(!field[i] && reserve.length > 0){
        const idx = Math.floor(Math.random() * reserve.length);
        const drawn = reserve[idx];
        state.animate.entering = [{ side, index:i, fromReserveIndex:idx }];
        setAction(`${sideName(side)} 從牌堆補位`, `翻出 ${drawn.value} 上場。`);
        render();
        await sleep(260);
        reserve.splice(idx, 1);
        field[i] = drawn;
        setField(side, field);
        setReserve(side, reserve);
        render();
        await sleep(320);
        state.animate.entering = [];
        render();
      }
    }
  }

  async function postResolveCleanup(){
    await refillSideAnimated('player');
    await refillSideAnimated('enemy');

    judgeWinner();
    render();
    if(state.winner) return;

    state.turn = state.turn === 'player' ? 'enemy' : 'player';
    clearSelection();
    if(state.turn === 'player') state.round += 1;

    if(state.turn === 'player'){
      setAction('輪到你了', '先點我方一張，再點敵方一張。');
    }else{
      setAction('輪到對方', '正在選目標。');
    }
    state.busy = false;
    render();

    if(state.turn === 'enemy'){
      await sleep(650);
      aiTurn();
    }
  }

  async function resolveAttack(side, attackerIndex, defenderIndex){
    if(state.busy || state.winner) return;

    const attackerField = [...getField(side)];
    const defenderSide = side === 'player' ? 'enemy' : 'player';
    const defenderField = [...getField(defenderSide)];

    const attacker = attackerField[attackerIndex];
    const defender = defenderField[defenderIndex];
    if(!attacker || !defender) return;

    state.busy = true;
    clearSelection();

    state.animate.attacking = { side, index: attackerIndex };
    state.animate.hit = null;
    state.animate.dying = [];
    render();
    setAction(`${sideName(side)} ${attacker.value} 發動攻擊`, `目標：${sideName(defenderSide)} ${defender.value}`);
    await sleep(260);

    state.animate.hit = { side: defenderSide, index: defenderIndex };
    render();
    await sleep(220);

    const aBefore = attacker.value;
    const dBefore = defender.value;
    const aAfter = Math.max(0, aBefore - dBefore);
    const dAfter = Math.max(0, dBefore - aBefore);

    attackerField[attackerIndex] = aAfter > 0 ? {...attacker, value:aAfter} : attacker;
    defenderField[defenderIndex] = dAfter > 0 ? {...defender, value:dAfter} : defender;
    setField(side, attackerField);
    setField(defenderSide, defenderField);

    if(aAfter <= 0) state.animate.dying.push({ side, index: attackerIndex });
    if(dAfter <= 0) state.animate.dying.push({ side: defenderSide, index: defenderIndex });

    if(aAfter <= 0 && dAfter <= 0){
      setAction('雙方互砍後都倒下', `${aBefore} ↔ ${dBefore}`);
    }else if(aAfter <= 0){
      setAction(`${sideName(side)} ${aBefore} 倒下`, `${sideName(defenderSide)} 剩 ${dAfter}`);
    }else if(dAfter <= 0){
      setAction(`${sideName(defenderSide)} ${dBefore} 倒下`, `${sideName(side)} 剩 ${aAfter}`);
    }else{
      setAction('雙方都存活', `${sideName(side)} 剩 ${aAfter}，${sideName(defenderSide)} 剩 ${dAfter}`);
    }

    render();
    await sleep(380);

    if(aAfter <= 0) attackerField[attackerIndex] = null;
    if(dAfter <= 0) defenderField[defenderIndex] = null;

    setField(side, attackerField);
    setField(defenderSide, defenderField);

    state.animate.attacking = null;
    state.animate.hit = null;
    state.animate.dying = [];
    render();
    await sleep(260);

    await postResolveCleanup();
  }

  function aiTurn(){
    if(state.winner) return;

    const attackers = state.enemyField.map((card, idx) => card ? {idx, card} : null).filter(Boolean);
    const targets = state.playerField.map((card, idx) => card ? {idx, card} : null).filter(Boolean);

    if(attackers.length === 0 || targets.length === 0){
      judgeWinner();
      render();
      return;
    }

    let best = null;
    for(const a of attackers){
      for(const t of targets){
        const aAfter = a.card.value - t.card.value;
        const tAfter = t.card.value - a.card.value;
        let score = 0;
        if(tAfter <= 0) score += 1200 + t.card.value;
        if(aAfter > 0) score += 420 + aAfter;
        if(aAfter <= 0) score -= Math.floor(a.card.value * 0.6);
        score += t.card.value * 0.1;
        score += Math.abs(a.card.value - t.card.value) < 30 ? 20 : 0;
        if(!best || score > best.score){
          best = { attackerIndex:a.idx, defenderIndex:t.idx, score };
        }
      }
    }

    resolveAttack('enemy', best.attackerIndex, best.defenderIndex);
  }

  el.newPresetBtn.addEventListener('click', () => setupGame(false));
  el.newRandomBtn.addEventListener('click', () => setupGame(true));

  setupGame(false);
})();
</script>
</body>
</html>
