<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no" />
<title>卡牌對決</title>
<style>
  :root{
    --bg:#070910;
    --panel:#121726;
    --line:#29314a;
    --text:#eef2ff;
    --muted:#99a5cb;
    --player:#7dd3fc;
    --enemy:#f9a8d4;
    --gold:#fcd34d;
    --ice:#93c5fd;
    --heal:#86efac;
    --select:#a78bfa;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;height:100%;
    background:#070910;
    color:var(--text);
    font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;
    overflow:hidden;
  }
  body{position:fixed;inset:0}
  .app{
    height:100dvh;
    max-width:560px;
    margin:0 auto;
    padding:
      calc(env(safe-area-inset-top) + 8px)
      calc(env(safe-area-inset-right) + 8px)
      calc(env(safe-area-inset-bottom) + 8px)
      calc(env(safe-area-inset-left) + 8px);
    position:relative;
    background:linear-gradient(180deg,#0c1020,#06070d 55%,#05060a);
  }
  .battle{
    height:100%;
    display:grid;
    grid-template-rows:28px minmax(0,1fr) minmax(0,1fr) 34px 48px;
    gap:10px;
  }
  .corner-row,.bottom-row{display:flex;justify-content:space-between;align-items:center;padding:0 2px}
  .chip{
    min-width:60px;height:28px;
    display:flex;align-items:center;justify-content:center;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    color:#dde5ff;font-size:12px;font-weight:1000;
  }
  .field{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;min-height:0}
  .card{
    min-height:100%;
    border-radius:24px;
    border:2px solid var(--line);
    background:
      radial-gradient(circle at top, rgba(255,255,255,.08), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      var(--panel);
    box-shadow:0 18px 40px rgba(0,0,0,.28);
    position:relative;
    overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:12px 8px 10px;
    transition:transform .22s ease, opacity .22s ease, filter .18s ease, box-shadow .18s ease, border-color .18s ease;
    user-select:none;
  }
  .player{background:
      radial-gradient(circle at top, rgba(125,211,252,.16), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      #142335;}
  .enemy{background:
      radial-gradient(circle at top, rgba(249,168,212,.16), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      #281c2b;}
  .role{text-align:center;font-size:12px;font-weight:1000;color:#e1e8ff;letter-spacing:.3px}
  .num{flex:1;display:flex;align-items:center;justify-content:center;font-size:48px;line-height:1;font-weight:1000}
  .badges{min-height:22px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
  .badge{
    padding:4px 8px;border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    font-size:11px;font-weight:1000;color:#d9e2ff;
  }
  .badge.shield{color:var(--gold)}
  .badge.freeze{color:var(--ice)}
  .badge.heal{color:var(--heal)}
  .card.selectable{border-color:rgba(125,211,252,.42)}
  .card.selected{border-color:var(--select);box-shadow:0 0 0 3px rgba(167,139,250,.24),0 18px 40px rgba(0,0,0,.28)}
  .card.targetable{border-color:rgba(252,211,77,.55);box-shadow:0 0 0 3px rgba(252,211,77,.18),0 18px 40px rgba(0,0,0,.28)}
  .card.frozen{filter:saturate(.72) brightness(.94)}
  .card.hit{box-shadow:0 0 0 4px rgba(252,211,77,.22),0 18px 40px rgba(0,0,0,.28);filter:brightness(1.14)}
  .card.healing{box-shadow:0 0 0 4px rgba(134,239,172,.18),0 18px 40px rgba(0,0,0,.28)}
  .card.dying{transform:scale(.82);opacity:.06;filter:grayscale(1)}
  .card.entering{animation:flipIn .42s ease;border-color:rgba(252,211,77,.55)}
  .card.shield-pop::after{
    content:"";position:absolute;inset:8px;border-radius:20px;border:3px solid rgba(252,211,77,.75);
    animation:shieldPulse .45s ease;pointer-events:none;
  }
  .card.slash::before{
    content:"";position:absolute;left:12%;right:12%;top:48%;height:4px;transform:rotate(-18deg);
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.96), transparent);
    box-shadow:0 0 10px rgba(255,255,255,.55);animation:slashFx .26s ease;pointer-events:none;
  }
  .card.heal-pop::before{
    content:"";position:absolute;left:20%;right:20%;top:24%;bottom:24%;border-radius:50%;
    border:3px solid rgba(134,239,172,.7);animation:healPulse .45s ease;pointer-events:none;
  }
  @keyframes flipIn{0%{transform:rotateY(90deg) scale(.88);opacity:.12}100%{transform:rotateY(0) scale(1);opacity:1}}
  @keyframes shieldPulse{0%{opacity:0;transform:scale(.92)}30%{opacity:1}100%{opacity:0;transform:scale(1.08)}}
  @keyframes slashFx{0%{opacity:0;transform:rotate(-18deg) scaleX(.2)}30%{opacity:1}100%{opacity:0;transform:rotate(-18deg) scaleX(1.15)}}
  @keyframes healPulse{0%{opacity:0;transform:scale(.8)}30%{opacity:1}100%{opacity:0;transform:scale(1.16)}}
  .dead{border-radius:24px;border:2px dashed rgba(255,255,255,.16);background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#8d97bd;gap:6px}
  .dead .x{font-size:34px;font-weight:1000;line-height:1}
  .dead .t{font-size:12px;font-weight:900}
  .flash-note{
    position:absolute;left:50%;top:calc(env(safe-area-inset-top) + 18px);transform:translateX(-50%);
    min-width:120px;max-width:78%;text-align:center;padding:8px 14px;border-radius:999px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);font-size:13px;font-weight:1000;
    color:#e7edff;opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .flash-note.show{opacity:1}
  .menu-row{display:flex;justify-content:center;align-items:center}
  .btn{
    height:48px;min-width:96px;border:none;border-radius:16px;background:linear-gradient(180deg,#2c345a,#242949);
    border:1px solid rgba(255,255,255,.07);color:#eef2ff;font-size:14px;font-weight:1000;box-shadow:0 10px 18px rgba(0,0,0,.18);
  }
  .btn:active{transform:scale(.985)}
  .overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(4,6,12,.58);backdrop-filter:blur(10px);z-index:10;padding:14px}
  .overlay.show{display:flex}
  .sheet{width:100%;max-height:100%;background:rgba(19,24,39,.97);border:1px solid var(--line);border-radius:28px;box-shadow:0 24px 70px rgba(0,0,0,.36);display:grid;grid-template-rows:auto auto 1fr auto;overflow:hidden}
  .sheet.slim{grid-template-rows:auto 1fr auto;max-width:430px}
  .sheet-hd{padding:18px 18px 10px}
  .sheet-ttl{font-size:28px;font-weight:1000}
  .sheet-sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.6}
  .resource{padding:0 18px 12px;display:flex;gap:8px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);font-size:13px;font-weight:1000}
  .pill.gold{color:var(--gold)}
  .sheet-bd{padding:0 18px 18px;overflow:auto}
  .sheet-ft{padding:12px 18px 18px;display:flex;gap:10px}
  .sheet-ft .btn,.menu-actions .btn{width:100%}
  .menu-actions{display:grid;gap:10px}
  .btn.alt{background:linear-gradient(180deg,#29314e,#212743)}
  .deck-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .owned{border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.04);padding:12px;display:grid;gap:10px}
  .owned.sel{border-color:rgba(125,211,252,.45);box-shadow:0 0 0 3px rgba(125,211,252,.14)}
  .owned-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .owned-role{font-size:12px;color:var(--muted);font-weight:1000}
  .power-big{font-size:30px;line-height:1;font-weight:1000}
  .lv{font-size:12px;color:#dce4ff;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);font-weight:1000}
  .owned-btns{display:grid;grid-template-columns:1fr auto;gap:8px}
  .tiny-btn{height:36px;border:none;border-radius:14px;background:linear-gradient(180deg,#2d355a,#252b49);color:#eef2ff;font-size:13px;font-weight:1000;border:1px solid rgba(255,255,255,.07)}
  .tiny-btn:disabled{opacity:.45}
  .reward-box{padding:18px;text-align:center}
  .reward-title{font-size:26px;font-weight:1000;margin-bottom:8px}
  .reward-items{margin-top:12px;display:grid;gap:10px}
  .reward-item{padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);font-size:15px;font-weight:1000}
  .version-badge{
    position:absolute;right:10px;bottom:10px;z-index:20;padding:6px 10px;border-radius:999px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:#cfd8ff;font-size:11px;font-weight:1000;letter-spacing:.4px;
    backdrop-filter:blur(6px);pointer-events:none;box-shadow:0 8px 18px rgba(0,0,0,.18);
  }
</style>
</head>
<body>
<div class="app">
  <div class="flash-note" id="flashNote"></div>

  <div class="battle">
    <div class="corner-row">
      <div class="chip" id="enemyReserve">3</div>
      <div></div>
    </div>

    <div class="field" id="enemyField"></div>
    <div class="field" id="playerField"></div>

    <div class="bottom-row">
      <div class="chip" id="playerReserve">3</div>
      <div class="chip" id="goldTiny">金幣 0</div>
    </div>

    <div class="menu-row">
      <button class="btn" id="menuBtn">主頁</button>
    </div>
  </div>

  <div class="overlay show" id="menuOverlay">
    <div class="sheet slim">
      <div class="sheet-hd">
        <div class="sheet-ttl">卡牌對決</div>
        <div class="sheet-sub">劍士高白值，弓箭手不吃反擊，魔法師冰凍 2 回合，盾衛只在出場時上一次盾，治療每回合開始補兩名隊友，雙刀可掃 2~3 人。</div>
      </div>
      <div class="resource">
        <div class="pill gold" id="menuGold">金幣 0</div>
        <div class="pill" id="menuStage">關卡 1</div>
        <div class="pill" id="menuDeck">牌組 6 / 6</div>
      </div>
      <div class="sheet-bd">
        <div class="menu-actions">
          <button class="btn" id="startBattleBtn">開始戰鬥</button>
          <button class="btn alt" id="editDeckBtn">編輯牌組</button>
          <button class="btn alt" id="upgradeBtn">升級卡牌</button>
          <button class="btn alt" id="resetBtn">重置進度</button>
        </div>
      </div>
      <div class="sheet-ft">
        <button class="btn alt" id="closeMenuBtn">回戰場</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="deckOverlay">
    <div class="sheet">
      <div class="sheet-hd">
        <div class="sheet-ttl">編輯牌組</div>
        <div class="sheet-sub">固定帶 6 張。不在牌組中的卡可賣掉。</div>
      </div>
      <div class="resource">
        <div class="pill" id="deckCountPill">已選 6 / 6</div>
      </div>
      <div class="sheet-bd">
        <div class="deck-grid" id="deckGrid"></div>
      </div>
      <div class="sheet-ft">
        <button class="btn alt" id="deckBackBtn">返回</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="upgradeOverlay">
    <div class="sheet">
      <div class="sheet-hd">
        <div class="sheet-ttl">升級卡牌</div>
        <div class="sheet-sub">每升 1 級，基礎值 +1；實際上場數字 = 基礎值 × 職業倍率 + 等級補正。</div>
      </div>
      <div class="resource">
        <div class="pill gold" id="upgradeGold">金幣 0</div>
      </div>
      <div class="sheet-bd">
        <div class="deck-grid" id="upgradeGrid"></div>
      </div>
      <div class="sheet-ft">
        <button class="btn alt" id="upgradeBackBtn">返回</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="rewardOverlay">
    <div class="sheet slim">
      <div class="reward-box">
        <div class="reward-title" id="rewardTitle">獲勝</div>
        <div class="sheet-sub" id="rewardSub">這關過了。</div>
        <div class="reward-items" id="rewardItems"></div>
      </div>
      <div class="sheet-ft">
        <button class="btn" id="nextStageBtn">下一關</button>
        <button class="btn alt" id="rewardMenuBtn">回主頁</button>
      </div>
    </div>
  </div>

  <div class="version-badge" id="versionBadge">v5.0.1</div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const saveKey = 'card_duel_progress_v5';
  const GAME_VERSION = 'v5.0.1';
  const ROLE_MULT = {
    '劍士': 1.30,
    '弓箭手': 0.80,
    '盾衛': 1.00,
    '魔法師': 0.90,
    '治療': 0.90,
    '雙刀': 0.70
  };
  const ROLES = Object.keys(ROLE_MULT);

  const ui = {
    enemyReserve: $('enemyReserve'),
    playerReserve: $('playerReserve'),
    goldTiny: $('goldTiny'),
    enemyField: $('enemyField'),
    playerField: $('playerField'),
    flashNote: $('flashNote'),
    menuOverlay: $('menuOverlay'),
    deckOverlay: $('deckOverlay'),
    upgradeOverlay: $('upgradeOverlay'),
    rewardOverlay: $('rewardOverlay'),
    menuGold: $('menuGold'),
    menuStage: $('menuStage'),
    menuDeck: $('menuDeck'),
    deckCountPill: $('deckCountPill'),
    deckGrid: $('deckGrid'),
    upgradeGrid: $('upgradeGrid'),
    upgradeGold: $('upgradeGold'),
    rewardTitle: $('rewardTitle'),
    rewardSub: $('rewardSub'),
    rewardItems: $('rewardItems'),
    versionBadge: $('versionBadge')
  };

  const state = {
    profile: null,
    battle: null,
    selection: null,
    busy: false,
    noteTimer: null
  };

  let nextCardId = 1;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function showNote(text) {
    clearTimeout(state.noteTimer);
    ui.flashNote.textContent = text;
    ui.flashNote.classList.add('show');
    state.noteTimer = setTimeout(() => ui.flashNote.classList.remove('show'), 760);
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

  function newOwnedCard(role, base, level = 1) {
    return { id: nextCardId++, role, base, level };
  }

  function cardPower(card) {
    return Math.max(1, Math.round(card.base * ROLE_MULT[card.role]) + (card.level - 1));
  }

  function defaultProfile() {
    const owned = [
      newOwnedCard('劍士', 6),
      newOwnedCard('弓箭手', 6),
      newOwnedCard('魔法師', 6),
      newOwnedCard('盾衛', 6),
      newOwnedCard('治療', 6),
      newOwnedCard('雙刀', 6),
      newOwnedCard('劍士', 7),
      newOwnedCard('盾衛', 7),
    ];
    return {
      gold: 12,
      stage: 1,
      owned,
      deck: owned.slice(0, 6).map(c => c.id)
    };
  }

  function saveProfile() {
    localStorage.setItem(saveKey, JSON.stringify(state.profile));
  }

  function loadProfile() {
    const raw = localStorage.getItem(saveKey);
    if (!raw) {
      state.profile = defaultProfile();
      saveProfile();
      return;
    }
    try {
      state.profile = JSON.parse(raw);
      nextCardId = Math.max(1, ...state.profile.owned.map(c => c.id)) + 1;
    } catch {
      state.profile = defaultProfile();
      saveProfile();
    }
  }

  function ownedById(id) {
    return state.profile.owned.find(c => c.id === id);
  }

  function showOverlay(which) {
    [ui.menuOverlay, ui.deckOverlay, ui.upgradeOverlay, ui.rewardOverlay].forEach(el => el.classList.remove('show'));
    if (which) which.classList.add('show');
  }

  function refreshMeta() {
    ui.menuGold.textContent = `金幣 ${state.profile.gold}`;
    ui.menuStage.textContent = `關卡 ${state.profile.stage}`;
    ui.menuDeck.textContent = `牌組 ${state.profile.deck.length} / 6`;
    ui.upgradeGold.textContent = `金幣 ${state.profile.gold}`;
    ui.deckCountPill.textContent = `已選 ${state.profile.deck.length} / 6`;
    ui.goldTiny.textContent = `金幣 ${state.profile.gold}`;
  }

  function makeBattleDeckFromIds(ids, side) {
    return ids.map(id => {
      const owned = ownedById(id);
      return {
        refId: owned.id,
        role: owned.role,
        value: cardPower(owned),
        side,
        shield: 0,
        frozen: 0,
        entryShielded: false
      };
    });
  }

  function enemyDeckForStage(stage) {
    const deck = [];
    const roleCount = Math.min(ROLES.length, 4 + Math.floor((stage - 1) / 2));
    const rolePool = ROLES.slice(0, roleCount);
    for (let i = 0; i < 6; i++) {
      const role = rolePool[Math.floor(Math.random() * rolePool.length)];
      const base = Math.max(5, 6 + Math.floor((stage - 1) * 0.7) + Math.floor(Math.random() * 3));
      deck.push({
        refId: `e_${stage}_${i}`,
        role,
        value: Math.max(1, Math.round(base * ROLE_MULT[role])),
        side: 'enemy',
        shield: 0,
        frozen: 0,
        entryShielded: false
      });
    }
    return deck;
  }

  function applyEntryShield(card) {
    if (card && card.role === '盾衛' && !card.entryShielded) {
      card.shield = 1;
      card.entryShielded = true;
      return true;
    }
    return false;
  }

  function getField(side) { return side === 'player' ? state.battle.playerField : state.battle.enemyField; }
  function getReserve(side) { return side === 'player' ? state.battle.playerReserve : state.battle.enemyReserve; }
  function setField(side, v) { side === 'player' ? state.battle.playerField = v : state.battle.enemyField = v; }
  function setReserve(side, v) { side === 'player' ? state.battle.playerReserve = v : state.battle.enemyReserve = v; }

  function totalRemaining(side) {
    return getField(side).filter(Boolean).length + getReserve(side).length;
  }

  function clearSelection() {
    state.selection = null;
  }

  function renderBadges(card) {
    const out = [];
    if (card.shield > 0) out.push(`<span class="badge shield">盾</span>`);
    if (card.frozen > 0) out.push(`<span class="badge freeze">冰${card.frozen}</span>`);
    if (card.role === '治療') out.push(`<span class="badge heal">補</span>`);
    return out.join('');
  }

  function deadSlotHTML() {
    return `<div class="dead"><div class="x">✕</div><div class="t">空位</div></div>`;
  }

  function getCardCenter(side, idx) {
    const el = document.querySelector(`[data-side="${side}"][data-index="${idx}"]`);
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  }

  function cardTransform(side, idx) {
    const a = state.battle.animate.lunge;
    if (!a || a.side !== side || a.index !== idx) return '';
    return `transform: translate(${a.tx}px, ${a.ty}px) scale(1.04); z-index:2;`;
  }

  function renderField(container, list, side) {
    container.innerHTML = '';
    list.forEach((card, idx) => {
      const anim = state.battle.animate;
      const dyingHere = anim.dying.some(x => x.side === side && x.index === idx);
      const shieldingHere = anim.shielding.some(x => x.side === side && x.index === idx);
      const healingHere = anim.healing.some(x => x.side === side && x.index === idx);

      if (!card) {
        container.insertAdjacentHTML('beforeend', deadSlotHTML());
        return;
      }

      const d = document.createElement('div');
      d.className = `card ${side === 'player' ? 'player' : 'enemy'}`;
      d.dataset.side = side;
      d.dataset.index = idx;

      if (card.frozen > 0) d.classList.add('frozen');
      if (side === 'player' && state.battle.turn === 'player' && !state.busy && !state.battle.over) {
        d.classList.add('selectable');
        if (state.selection === idx) d.classList.add('selected');
        d.addEventListener('click', () => {
          state.selection = idx;
          refreshBattle();
        });
      }
      if (side === 'enemy' && state.battle.turn === 'player' && state.selection !== null && !state.busy && !state.battle.over) {
        d.classList.add('targetable');
        d.addEventListener('click', () => resolveAttack('player', state.selection, idx));
      }

      if (anim.hit.some(x => x.side === side && x.index === idx)) d.classList.add('hit', 'slash');
      if (dyingHere) d.classList.add('dying');
      if (anim.entering.some(x => x.side === side && x.index === idx)) d.classList.add('entering');
      if (shieldingHere) d.classList.add('shield-pop');
      if (healingHere) d.classList.add('healing', 'heal-pop');

      d.style.cssText += cardTransform(side, idx);
      d.innerHTML = `
        <div class="role">${card.role}</div>
        <div class="num">${card.value}</div>
        <div class="badges">${renderBadges(card)}</div>
      `;
      container.appendChild(d);
    });
  }

  function refreshBattle() {
    if (!state.battle) return;
    ui.enemyReserve.textContent = state.battle.enemyReserve.length;
    ui.playerReserve.textContent = state.battle.playerReserve.length;
    renderField(ui.enemyField, state.battle.enemyField, 'enemy');
    renderField(ui.playerField, state.battle.playerField, 'player');
    refreshMeta();
  }

  function applyEntryShieldsForStart() {
    ['player', 'enemy'].forEach(side => {
      const field = [...getField(side)];
      let marks = [];
      for (let i = 0; i < field.length; i++) {
        if (field[i]) {
          const c = { ...field[i] };
          if (applyEntryShield(c)) {
            field[i] = c;
            marks.push({ side, index: i });
          }
        }
      }
      setField(side, field);
      if (marks.length) state.battle.animate.shielding.push(...marks);
    });
  }

  async function refillSideAnimated(side) {
    const field = [...getField(side)];
    const reserve = [...getReserve(side)];

    for (let i = 0; i < field.length; i++) {
      if (!field[i] && reserve.length > 0) {
        const idx = Math.floor(Math.random() * reserve.length);
        const drawn = { ...reserve[idx] };
        reserve.splice(idx, 1);
        state.battle.animate.entering = [{ side, index: i }];
        if (applyEntryShield(drawn)) {
          state.battle.animate.shielding = [{ side, index: i }];
        } else {
          state.battle.animate.shielding = [];
        }
        field[i] = drawn;
        setField(side, field);
        setReserve(side, reserve);
        refreshBattle();
        await sleep(320);
        state.battle.animate.entering = [];
        state.battle.animate.shielding = [];
        refreshBattle();
      }
    }
  }

  function chooseHealTargets(side, healerIndex) {
    const field = getField(side)
      .map((card, idx) => (card && idx !== healerIndex) ? { card, idx } : null)
      .filter(Boolean)
      .sort((a, b) => a.card.value - b.card.value);
    return field.slice(0, 2).map(x => x.idx);
  }

  async function applyTurnStartSkills(side) {
    const field = [...getField(side)];
    let anyHeal = false;
    let healMarks = [];

    for (let i = 0; i < field.length; i++) {
      const card = field[i];
      if (!card) continue;

      if (card.role === '治療') {
        const targets = chooseHealTargets(side, i);
        if (!targets.length) continue;
        const healAmount = Math.max(1, Math.ceil(card.value * 0.15));
        targets.forEach(ti => {
          const target = { ...field[ti] };
          target.value += healAmount;
          field[ti] = target;
          healMarks.push({ side, index: ti });
        });
        anyHeal = true;
        showNote(`治療 +${healAmount}`);
      }
    }

    if (anyHeal) {
      setField(side, field);
      state.battle.animate.healing = healMarks;
      refreshBattle();
      await sleep(420);
      state.battle.animate.healing = [];
      refreshBattle();
    }
  }

  function decrementFrozenForSide(side) {
    const field = getField(side).map(card => {
      if (!card) return null;
      if (card.frozen > 0) return { ...card, frozen: card.frozen - 1 };
      return card;
    });
    setField(side, field);
  }

  function endBattle(win) {
    state.battle.over = true;
    state.busy = false;
    clearSelection();

    if (win) {
      const goldGain = 5 + state.profile.stage * 2;
      state.profile.gold += goldGain;
      const items = [`金幣 +${goldGain}`];
      if (Math.random() < 0.42) {
        const role = ROLES[Math.floor(Math.random() * ROLES.length)];
        const base = Math.max(6, 6 + Math.floor(state.profile.stage * 0.55) + Math.floor(Math.random() * 2));
        const card = newOwnedCard(role, base);
        state.profile.owned.push(card);
        items.push(`新卡：${card.role} ${cardPower(card)}`);
      }
      state.profile.stage += 1;
      saveProfile();
      refreshMeta();
      ui.rewardTitle.textContent = '獲勝';
      ui.rewardSub.textContent = '這關打完了，拿資源去養牌。';
      ui.rewardItems.innerHTML = items.map(x => `<div class="reward-item">${x}</div>`).join('');
      showOverlay(ui.rewardOverlay);
    } else {
      ui.rewardTitle.textContent = '失敗';
      ui.rewardSub.textContent = '先回去調整牌組或升級。';
      ui.rewardItems.innerHTML = `<div class="reward-item">沒有通關獎勵</div>`;
      showOverlay(ui.rewardOverlay);
    }
  }

  function judgeWinner() {
    const p = totalRemaining('player');
    const e = totalRemaining('enemy');
    if (e <= 0 && p <= 0) { endBattle(false); return true; }
    if (e <= 0) { endBattle(true); return true; }
    if (p <= 0) { endBattle(false); return true; }
    return false;
  }

  async function startTurn(side) {
    if (!state.battle || state.battle.over) return;
    state.battle.turn = side;
    clearSelection();
    state.busy = true;
    await applyTurnStartSkills(side);
    state.busy = false;
    refreshBattle();

    if (side === 'enemy') {
      await sleep(420);
      aiTurn();
    }
  }

  function resolvePrimaryEffects(attacker, defender) {
    const notes = [];
    if (attacker.role === '魔法師') {
      defender.frozen = Math.max(defender.frozen, 2);
      notes.push('冰凍');
    }
    if (defender.role === '魔法師') {
      attacker.frozen = Math.max(attacker.frozen, 2);
      notes.push('反制冰凍');
    }
    return notes;
  }

  function randomOtherIndices(list, excludeIndex, count) {
    const pool = list
      .map((card, idx) => (card && idx !== excludeIndex) ? idx : null)
      .filter(v => v !== null);
    return shuffle(pool).slice(0, count);
  }

  async function resolveAttack(side, attackerIndex, primaryIndex) {
    if (state.busy || !state.battle || state.battle.over) return;

    const defendSide = side === 'player' ? 'enemy' : 'player';
    const attackerField = [...getField(side)];
    const defenderField = [...getField(defendSide)];
    const attacker = clone(attackerField[attackerIndex]);
    const primary = clone(defenderField[primaryIndex]);
    if (!attacker || !primary) return;

    state.busy = true;
    clearSelection();

    let targetIndices = [primaryIndex];
    if (attacker.role === '雙刀') {
      const extraCount = Math.random() < 0.5 ? 2 : 1;
      targetIndices = [primaryIndex, ...randomOtherIndices(defenderField, primaryIndex, extraCount)];
    }

    const aCenter = getCardCenter(side, attackerIndex);
    const dCenter = getCardCenter(defendSide, primaryIndex);
    if (aCenter && dCenter) {
      state.battle.animate.lunge = {
        side, index: attackerIndex,
        tx: (dCenter.x - aCenter.x) * 0.42,
        ty: (dCenter.y - aCenter.y) * 0.42
      };
      refreshBattle();
      await sleep(220);
    }

    state.battle.animate.hit = targetIndices.map(i => ({ side: defendSide, index: i }));
    refreshBattle();
    await sleep(180);

    const attackerCanDealDamage = attacker.frozen <= 0;
    const attackDamage = attackerCanDealDamage ? attacker.value : 0;
    let counterDamage = 0;

    if (attacker.role !== '弓箭手') {
      const mainDef = clone(defenderField[primaryIndex]);
      if (mainDef) {
        const defenderCanDealDamage = mainDef.frozen <= 0;
        counterDamage = defenderCanDealDamage ? mainDef.value : 0;
      }
    }

    for (const ti of targetIndices) {
      const target = clone(defenderField[ti]);
      if (!target) continue;

      if (attackDamage > 0) {
        if (target.shield > 0) {
          target.shield = 0;
        } else {
          target.value = Math.max(0, target.value - attackDamage);
        }
      }

      defenderField[ti] = target;
    }

    let mainTarget = clone(defenderField[primaryIndex]);
    const effectNotes = [];
    if (mainTarget) {
      effectNotes.push(...resolvePrimaryEffects(attacker, mainTarget));
      defenderField[primaryIndex] = mainTarget;
    }

    if (counterDamage > 0) {
      if (attacker.shield > 0) attacker.shield = 0;
      else attacker.value = Math.max(0, attacker.value - counterDamage);
    }

    attackerField[attackerIndex] = attacker;
    setField(side, attackerField);
    setField(defendSide, defenderField);

    const dying = [];
    if (attacker.value <= 0) dying.push({ side, index: attackerIndex });
    targetIndices.forEach(ti => {
      const c = defenderField[ti];
      if (c && c.value <= 0) dying.push({ side: defendSide, index: ti });
    });
    state.battle.animate.dying = dying;

    if (attacker.role === '雙刀') showNote(`雙刀掃 ${targetIndices.length} 目標`);
    else showNote(`${attacker.role} 出手`);

    refreshBattle();
    await sleep(320);

    if (effectNotes.length) {
      showNote(effectNotes.join(' / '));
      refreshBattle();
      await sleep(260);
    }

    if (attacker.value <= 0) attackerField[attackerIndex] = null;
    targetIndices.forEach(ti => {
      const c = defenderField[ti];
      if (c && c.value <= 0) defenderField[ti] = null;
    });

    setField(side, attackerField);
    setField(defendSide, defenderField);

    state.battle.animate.lunge = null;
    state.battle.animate.hit = [];
    state.battle.animate.dying = [];
    refreshBattle();
    await sleep(220);

    await refillSideAnimated('player');
    await refillSideAnimated('enemy');
    if (judgeWinner()) return;

    decrementFrozenForSide(side);
    refreshBattle();

    state.busy = false;
    await startTurn(side === 'player' ? 'enemy' : 'player');
  }

  function aiEvaluate(attackCard, primaryIdx, defenders) {
    const primary = defenders[primaryIdx];
    if (!primary) return -9999;
    const attackDamage = attackCard.frozen > 0 ? 0 : attackCard.value;
    let score = 0;

    if (attackCard.role === '雙刀') {
      const extraTargets = defenders.filter((c, idx) => c && idx !== primaryIdx);
      score += Math.min(extraTargets.length, 2) * attackDamage * 0.55;
    }

    if (primary.shield > 0 && attackDamage > 0) score += 70;
    if (attackDamage >= primary.value && attackDamage > 0) score += 1000 + primary.value * 8;
    score += primary.value * 6;

    if (attackCard.role === '弓箭手') score += 150;
    if (attackCard.role === '魔法師') score += 180;
    if (attackCard.role === '治療') score -= 80;
    if (attackCard.frozen > 0) score -= 120;

    return score + Math.random() * 40;
  }

  function aiTurn() {
    if (!state.battle || state.battle.over || state.busy) return;

    const attackers = state.battle.enemyField
      .map((c, i) => c ? { i, c } : null)
      .filter(Boolean);
    const defenders = state.battle.playerField;

    const plans = [];
    for (const a of attackers) {
      for (let ti = 0; ti < defenders.length; ti++) {
        if (!defenders[ti]) continue;
        plans.push({
          ai: a.i,
          ti,
          score: aiEvaluate(a.c, ti, defenders)
        });
      }
    }
    plans.sort((a, b) => b.score - a.score);
    const pickPool = plans.slice(0, Math.min(3, plans.length));
    const pick = pickPool[Math.floor(Math.random() * pickPool.length)];
    if (pick) resolveAttack('enemy', pick.ai, pick.ti);
  }

  function renderDeckEditor() {
    ui.deckCountPill.textContent = `已選 ${state.profile.deck.length} / 6`;
    ui.deckGrid.innerHTML = state.profile.owned.map(card => {
      const selected = state.profile.deck.includes(card.id);
      const sellPrice = Math.max(1, Math.floor((card.base + card.level) / 2));
      return `
        <div class="owned ${selected ? 'sel' : ''}">
          <div class="owned-top">
            <div>
              <div class="owned-role">${card.role}</div>
              <div class="power-big">${cardPower(card)}</div>
            </div>
            <div class="lv">Lv.${card.level}</div>
          </div>
          <div class="owned-btns">
            <button class="tiny-btn" data-toggle="${card.id}">${selected ? '移出牌組' : '加入牌組'}</button>
            <div class="lv">基礎 ${card.base}</div>
          </div>
          ${selected ? '' : `<div class="owned-btns"><button class="tiny-btn" data-sell="${card.id}">賣出 ${sellPrice}</button><div class="lv">倉庫</div></div>`}
        </div>
      `;
    }).join('');

    ui.deckGrid.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.toggle);
        const inDeck = state.profile.deck.includes(id);
        if (inDeck) {
          if (state.profile.deck.length <= 1) return;
          state.profile.deck = state.profile.deck.filter(x => x !== id);
        } else {
          if (state.profile.deck.length >= 6) return;
          state.profile.deck.push(id);
        }
        saveProfile();
        refreshMeta();
        renderDeckEditor();
      });
    });

    ui.deckGrid.querySelectorAll('[data-sell]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.sell);
        if (state.profile.deck.includes(id)) return;
        const card = ownedById(id);
        if (!card) return;
        const price = Math.max(1, Math.floor((card.base + card.level) / 2));
        state.profile.gold += price;
        state.profile.owned = state.profile.owned.filter(c => c.id !== id);
        saveProfile();
        refreshMeta();
        renderDeckEditor();
        renderUpgradeEditor();
        showNote(`賣出 ${card.role} +${price} 金幣`);
      });
    });
  }

  function renderUpgradeEditor() {
    ui.upgradeGold.textContent = `金幣 ${state.profile.gold}`;
    ui.upgradeGrid.innerHTML = state.profile.owned.map(card => {
      const cost = card.level * 6;
      return `
        <div class="owned">
          <div class="owned-top">
            <div>
              <div class="owned-role">${card.role}</div>
              <div class="power-big">${cardPower(card)}</div>
            </div>
            <div class="lv">Lv.${card.level}</div>
          </div>
          <div class="owned-btns">
            <button class="tiny-btn" data-up="${card.id}" ${state.profile.gold < cost ? 'disabled' : ''}>升級 ${cost}</button>
            <div class="lv">基礎 ${card.base}</div>
          </div>
        </div>
      `;
    }).join('');

    ui.upgradeGrid.querySelectorAll('[data-up]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.up);
        const card = ownedById(id);
        const cost = card.level * 6;
        if (state.profile.gold < cost) return;
        state.profile.gold -= cost;
        card.level += 1;
        card.base += 1;
        saveProfile();
        refreshMeta();
        renderUpgradeEditor();
        renderDeckEditor();
      });
    });
  }

  $('startBattleBtn').addEventListener('click', startBattle);
  $('editDeckBtn').addEventListener('click', () => { renderDeckEditor(); showOverlay(ui.deckOverlay); });
  $('upgradeBtn').addEventListener('click', () => { renderUpgradeEditor(); showOverlay(ui.upgradeOverlay); });
  $('closeMenuBtn').addEventListener('click', () => { if (state.battle && !state.battle.over) showOverlay(null); });
  $('deckBackBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('upgradeBackBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('rewardMenuBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('nextStageBtn').addEventListener('click', () => {
    if (ui.rewardTitle.textContent === '獲勝') startBattle();
    else showOverlay(ui.menuOverlay);
  });
  $('menuBtn').addEventListener('click', () => { refreshMeta(); showOverlay(ui.menuOverlay); });
  $('resetBtn').addEventListener('click', () => {
    localStorage.removeItem(saveKey);
    loadProfile();
    refreshMeta();
    renderDeckEditor();
    renderUpgradeEditor();
    showNote('進度已重置');
    showOverlay(ui.menuOverlay);
  });

  ui.versionBadge.textContent = GAME_VERSION;
  loadProfile();
  refreshMeta();
  renderDeckEditor();
  renderUpgradeEditor();
})();
</script>
</body>
</html>
