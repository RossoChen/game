<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no" />
<title>卡牌對決</title>
<style>
  :root{
    --bg:#0b0d16;
    --panel:#131827;
    --panel2:#1a2032;
    --line:#2a324b;
    --text:#eef2ff;
    --muted:#98a2c9;
    --player:#7dd3fc;
    --enemy:#f9a8d4;
    --gold:#fcd34d;
    --good:#86efac;
    --bad:#fca5a5;
    --select:#a78bfa;
    --shadow:0 18px 40px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;height:100%;
    background:linear-gradient(180deg,#101427,#090b12 55%,#06070d);
    color:var(--text);
    font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;
    overflow:hidden;
  }
  body{position:fixed; inset:0}
  .app{
    height:100dvh;
    width:100%;
    max-width:540px;
    margin:0 auto;
    padding:
      calc(env(safe-area-inset-top) + 8px)
      calc(env(safe-area-inset-right) + 8px)
      calc(env(safe-area-inset-bottom) + 8px)
      calc(env(safe-area-inset-left) + 8px);
    position:relative;
  }
  .battle-screen{
    height:100%;
    display:grid;
    grid-template-rows:28px auto 1fr auto 1fr auto 44px;
    gap:8px;
  }
  .corner-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:var(--muted);
    padding:0 2px;
  }
  .tiny{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    border-radius:999px;
    padding:5px 10px;
    min-width:54px;
    text-align:center;
    font-weight:900;
    color:#dde5ff;
  }
  .field{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    min-height:0;
  }
  .mid-status{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:4px 8px;
  }
  .toast{
    min-height:34px;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    color:#dbe4ff;
    font-size:13px;
    font-weight:900;
    text-align:center;
    max-width:100%;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .card{
    min-height:100%;
    border-radius:22px;
    border:2px solid var(--line);
    background:
      radial-gradient(circle at top, rgba(255,255,255,.08), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      var(--panel);
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
    transition:
      transform .28s ease,
      opacity .28s ease,
      filter .22s ease,
      box-shadow .18s ease,
      border-color .18s ease;
  }
  .player-card{
    background:
      radial-gradient(circle at top, rgba(125,211,252,.16), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      #152435;
  }
  .enemy-card{
    background:
      radial-gradient(circle at top, rgba(249,168,212,.16), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      #291d2b;
  }
  .card .num{
    font-size:44px;
    line-height:1;
    font-weight:1000;
    letter-spacing:.6px;
  }
  .card.selectable{border-color:rgba(125,211,252,.42)}
  .card.selected{
    border-color:var(--select);
    box-shadow:0 0 0 3px rgba(167,139,250,.24), var(--shadow);
  }
  .card.targetable{
    border-color:rgba(252,211,77,.56);
    box-shadow:0 0 0 3px rgba(252,211,77,.18), var(--shadow);
  }
  .card.attacking.player-card{ transform:translateY(-12px) scale(1.04); }
  .card.attacking.enemy-card{ transform:translateY(12px) scale(1.04); }
  .card.hit{
    box-shadow:0 0 0 4px rgba(252,211,77,.22), var(--shadow);
    filter:brightness(1.18);
  }
  .card.dying{
    transform:scale(.82);
    opacity:.06;
    filter:grayscale(1);
  }
  .card.entering{
    animation:flipIn .44s ease;
    border-color:rgba(252,211,77,.55);
  }
  @keyframes flipIn{
    0%{ transform:rotateY(90deg) scale(.88); opacity:.12; }
    100%{ transform:rotateY(0) scale(1); opacity:1; }
  }
  .dead-slot{
    border-radius:22px;
    border:2px dashed rgba(255,255,255,.16);
    background:rgba(255,255,255,.03);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#8d97bd;
    gap:6px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
  }
  .dead-slot .x{font-size:34px;font-weight:1000;line-height:1}
  .dead-slot .t{font-size:12px;font-weight:800}
  .bottom-actions{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
  }
  .mini-btn{
    height:44px;
    min-width:88px;
    border:none;
    border-radius:16px;
    background:linear-gradient(180deg,#2c345a,#242949);
    border:1px solid rgba(255,255,255,.07);
    color:#eef2ff;
    font-size:14px;
    font-weight:1000;
    box-shadow:0 10px 18px rgba(0,0,0,.18);
  }
  .mini-btn:active{transform:scale(.985)}
  .overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(4,6,12,.58);
    backdrop-filter:blur(10px);
    z-index:10;
    padding:14px;
  }
  .overlay.show{display:flex}
  .sheet{
    width:100%;
    max-height:100%;
    background:rgba(19,24,39,.97);
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:0 24px 70px rgba(0,0,0,.36);
    display:grid;
    grid-template-rows:auto auto 1fr auto;
    overflow:hidden;
  }
  .sheet.slim{
    grid-template-rows:auto 1fr auto;
    max-width:430px;
  }
  .sheet-hd{
    padding:18px 18px 10px;
  }
  .sheet-ttl{
    font-size:28px;
    font-weight:1000;
    letter-spacing:.4px;
  }
  .sheet-sub{
    margin-top:6px;
    color:var(--muted);
    font-size:13px;
    line-height:1.6;
  }
  .resource-bar{
    padding:0 18px 12px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.07);
    font-size:13px;
    font-weight:900;
  }
  .pill.gold{color:var(--gold)}
  .sheet-bd{
    padding:0 18px 18px;
    overflow:auto;
  }
  .menu-actions{
    display:grid;
    gap:10px;
  }
  .main-btn{
    height:56px;
    border:none;
    border-radius:18px;
    background:linear-gradient(180deg,#334076,#29305a);
    color:#eef2ff;
    font-size:16px;
    font-weight:1000;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 14px 22px rgba(0,0,0,.18);
  }
  .main-btn.alt{
    background:linear-gradient(180deg,#29314e,#212743);
  }
  .main-btn:active{transform:scale(.986)}
  .small-note{
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
    line-height:1.6;
  }
  .deck-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  .info-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    font-size:13px;
    color:var(--muted);
  }
  .owned-card{
    border-radius:18px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.04);
    padding:12px;
    display:grid;
    gap:10px;
  }
  .owned-card.sel{
    border-color:rgba(125,211,252,.45);
    box-shadow:0 0 0 3px rgba(125,211,252,.14);
  }
  .owned-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
  }
  .role{
    font-size:12px;
    color:var(--muted);
    font-weight:900;
  }
  .power-big{
    font-size:30px;
    line-height:1;
    font-weight:1000;
  }
  .lv{
    font-size:12px;
    color:#dce4ff;
    padding:5px 8px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.07);
    font-weight:900;
  }
  .owned-btns{
    display:grid;
    grid-template-columns:1fr auto;
    gap:8px;
  }
  .tiny-btn{
    height:36px;
    border:none;
    border-radius:14px;
    background:linear-gradient(180deg,#2d355a,#252b49);
    color:#eef2ff;
    font-size:13px;
    font-weight:1000;
    border:1px solid rgba(255,255,255,.07);
  }
  .tiny-btn:disabled{
    opacity:.45;
  }
  .sheet-ft{
    padding:12px 18px 18px;
    display:flex;
    gap:10px;
  }
  .sheet-ft .main-btn{flex:1}
  .reward-box{
    padding:18px;
    text-align:center;
  }
  .reward-title{
    font-size:26px;
    font-weight:1000;
    margin-bottom:8px;
  }
  .reward-items{
    margin-top:12px;
    display:grid;
    gap:10px;
  }
  .reward-item{
    padding:12px 14px;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    font-size:15px;
    font-weight:900;
  }
</style>
</head>
<body>
<div class="app">
  <div class="battle-screen">
    <div class="corner-row">
      <div class="tiny" id="enemyReserve">3</div>
      <div class="tiny" id="stageTiny">1-1</div>
    </div>

    <div class="field" id="enemyField"></div>

    <div class="mid-status">
      <div class="toast" id="battleToast">先選我方一張牌</div>
    </div>

    <div class="field" id="playerField"></div>

    <div class="corner-row">
      <div class="tiny" id="playerReserve">3</div>
      <div class="tiny" id="goldTiny">金幣 0</div>
    </div>

    <div></div>

    <div class="bottom-actions">
      <button class="mini-btn" id="menuBtn">主頁</button>
    </div>
  </div>

  <div class="overlay show" id="menuOverlay">
    <div class="sheet slim">
      <div class="sheet-hd">
        <div class="sheet-ttl">卡牌對決</div>
        <div class="sheet-sub">戰鬥畫面只留必要資訊。編隊、升級、獎勵都收在外層，不擋對戰。</div>
      </div>
      <div class="resource-bar">
        <div class="pill gold" id="menuGold">金幣 0</div>
        <div class="pill" id="menuStage">關卡 1</div>
        <div class="pill" id="menuDeck">牌組 6 / 6</div>
      </div>
      <div class="sheet-bd">
        <div class="menu-actions">
          <button class="main-btn" id="startBattleBtn">開始戰鬥</button>
          <button class="main-btn alt" id="editDeckBtn">編輯牌組</button>
          <button class="main-btn alt" id="upgradeBtn">升級卡牌</button>
          <button class="main-btn alt" id="resetBtn">重置進度</button>
        </div>
        <div class="small-note">
          規則：雙方各帶 6 張，場上 3 張。數字同時是攻擊與血量。互砍後留下差值，死亡卡位會補下一張。
        </div>
      </div>
      <div class="sheet-ft">
        <button class="main-btn alt" id="closeMenuBtn">回戰場</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="deckOverlay">
    <div class="sheet">
      <div class="sheet-hd">
        <div class="sheet-ttl">編輯牌組</div>
        <div class="sheet-sub">帶 6 張上場。戰鬥中只顯示數字，職業定位在這裡看就夠了。</div>
      </div>
      <div class="resource-bar">
        <div class="pill" id="deckCountPill">已選 6 / 6</div>
      </div>
      <div class="sheet-bd">
        <div class="deck-grid" id="deckGrid"></div>
      </div>
      <div class="sheet-ft">
        <button class="main-btn alt" id="deckBackBtn">返回</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="upgradeOverlay">
    <div class="sheet">
      <div class="sheet-hd">
        <div class="sheet-ttl">升級卡牌</div>
        <div class="sheet-sub">每升 1 級，卡牌基礎值 +1。前期就從個位數慢慢養，不玩一開始就 200、300 那套。</div>
      </div>
      <div class="resource-bar">
        <div class="pill gold" id="upgradeGold">金幣 0</div>
      </div>
      <div class="sheet-bd">
        <div class="deck-grid" id="upgradeGrid"></div>
      </div>
      <div class="sheet-ft">
        <button class="main-btn alt" id="upgradeBackBtn">返回</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="rewardOverlay">
    <div class="sheet slim">
      <div class="reward-box">
        <div class="reward-title" id="rewardTitle">獲勝</div>
        <div class="sheet-sub" id="rewardSub">這關過了。</div>
        <div class="reward-items" id="rewardItems"></div>
      </div>
      <div class="sheet-ft">
        <button class="main-btn" id="nextStageBtn">下一關</button>
        <button class="main-btn alt" id="rewardMenuBtn">回主頁</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const saveKey = 'card_duel_progress_v1';
  const roles = ['劍士','弓箭手','魔法師','盾衛'];

  const ui = {
    enemyReserve: $('enemyReserve'),
    playerReserve: $('playerReserve'),
    stageTiny: $('stageTiny'),
    goldTiny: $('goldTiny'),
    enemyField: $('enemyField'),
    playerField: $('playerField'),
    battleToast: $('battleToast'),
    menuOverlay: $('menuOverlay'),
    deckOverlay: $('deckOverlay'),
    upgradeOverlay: $('upgradeOverlay'),
    rewardOverlay: $('rewardOverlay'),
    menuGold: $('menuGold'),
    menuStage: $('menuStage'),
    menuDeck: $('menuDeck'),
    deckCountPill: $('deckCountPill'),
    deckGrid: $('deckGrid'),
    upgradeGrid: $('upgradeGrid'),
    upgradeGold: $('upgradeGold'),
    rewardTitle: $('rewardTitle'),
    rewardSub: $('rewardSub'),
    rewardItems: $('rewardItems'),
  };

  const state = {
    profile: null,
    battle: null,
    selection: null,
    busy: false,
    rewardData: null,
  };

  let nextCardId = 1;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function newOwnedCard(role, base, level=1){
    return { id: nextCardId++, role, base, level };
  }

  function cardPower(card){
    return card.base + card.level - 1;
  }

  function defaultProfile(){
    const owned = [
      newOwnedCard('劍士', 5),
      newOwnedCard('劍士', 6),
      newOwnedCard('劍士', 6),
      newOwnedCard('弓箭手', 4),
      newOwnedCard('弓箭手', 5),
      newOwnedCard('魔法師', 5),
      newOwnedCard('盾衛', 7),
      newOwnedCard('劍士', 8),
    ];
    return {
      gold: 12,
      stage: 1,
      owned,
      deck: owned.slice(0,6).map(c => c.id),
    };
  }

  function saveProfile(){
    localStorage.setItem(saveKey, JSON.stringify(state.profile));
  }

  function loadProfile(){
    const raw = localStorage.getItem(saveKey);
    if(!raw){
      state.profile = defaultProfile();
      saveProfile();
      return;
    }
    try{
      const data = JSON.parse(raw);
      state.profile = data;
      nextCardId = Math.max(1, ...state.profile.owned.map(c => c.id)) + 1;
    }catch{
      state.profile = defaultProfile();
      saveProfile();
    }
  }

  function showOverlay(which){
    [ui.menuOverlay, ui.deckOverlay, ui.upgradeOverlay, ui.rewardOverlay].forEach(el => el.classList.remove('show'));
    if(which) which.classList.add('show');
  }

  function setToast(text){
    ui.battleToast.textContent = text;
  }

  function refreshMeta(){
    ui.menuGold.textContent = `金幣 ${state.profile.gold}`;
    ui.menuStage.textContent = `關卡 ${state.profile.stage}`;
    ui.menuDeck.textContent = `牌組 ${state.profile.deck.length} / 6`;
    ui.upgradeGold.textContent = `金幣 ${state.profile.gold}`;
    ui.deckCountPill.textContent = `已選 ${state.profile.deck.length} / 6`;
    ui.goldTiny.textContent = `金幣 ${state.profile.gold}`;
    ui.stageTiny.textContent = `${state.profile.stage}-1`;
  }

  function ownedById(id){
    return state.profile.owned.find(c => c.id === id);
  }

  function makeBattleDeckFromIds(ids, side){
    return ids.map(id => {
      const owned = ownedById(id);
      return {
        refId: owned.id,
        role: owned.role,
        value: cardPower(owned),
        side
      };
    });
  }

  function enemyDeckForStage(stage){
    const pool = [];
    const count = Math.min(4, 1 + Math.floor((stage - 1) / 3));
    for(let i=0;i<6;i++){
      const role = roles[Math.floor(Math.random() * count)];
      const base = Math.max(3, 4 + Math.floor((stage - 1) * 0.7) + Math.floor(Math.random() * 4));
      pool.push({
        refId: 'e' + stage + '_' + i,
        role,
        value: base,
        side:'enemy'
      });
    }
    return pool;
  }

  function startBattle(){
    if(state.profile.deck.length !== 6){
      setToast('牌組要先選滿 6 張');
      return;
    }

    const playerDeck = makeBattleDeckFromIds(state.profile.deck, 'player');
    const enemyDeck = enemyDeckForStage(state.profile.stage);

    state.battle = {
      playerField: playerDeck.slice(0,3),
      enemyField: enemyDeck.slice(0,3),
      playerReserve: playerDeck.slice(3),
      enemyReserve: enemyDeck.slice(3),
      animate: { attacking:null, hit:null, dying:[], entering:[] },
      turn: 'player',
      over: false
    };
    state.selection = null;
    state.busy = false;
    refreshBattle();
    setToast('先選我方一張牌');
    showOverlay(null);
  }

  function totalRemaining(side){
    const b = state.battle;
    return (side === 'player' ? b.playerField : b.enemyField).filter(Boolean).length
      + (side === 'player' ? b.playerReserve : b.enemyReserve).length;
  }

  function clearSelection(){
    state.selection = null;
  }

  function deadSlotHTML(){
    return `<div class="dead-slot"><div class="x">✕</div><div class="t">空位</div></div>`;
  }

  function renderField(container, list, side){
    container.innerHTML = '';
    list.forEach((card, idx) => {
      const anim = state.battle.animate;
      const dyingHere = anim.dying.some(x => x.side === side && x.index === idx);

      if(!card){
        container.insertAdjacentHTML('beforeend', deadSlotHTML());
        return;
      }

      const d = document.createElement('div');
      d.className = `card ${side === 'player' ? 'player-card' : 'enemy-card'}`;

      if(side === 'player' && state.battle.turn === 'player' && !state.busy && !state.battle.over){
        d.classList.add('selectable');
        if(state.selection === idx) d.classList.add('selected');
        d.addEventListener('click', () => {
          state.selection = idx;
          refreshBattle();
          setToast('再點敵方一張牌');
        });
      }

      if(side === 'enemy' && state.battle.turn === 'player' && state.selection !== null && !state.busy && !state.battle.over){
        d.classList.add('targetable');
        d.addEventListener('click', () => {
          resolveAttack('player', state.selection, idx);
        });
      }

      if(anim.attacking && anim.attacking.side === side && anim.attacking.index === idx) d.classList.add('attacking');
      if(anim.hit && anim.hit.side === side && anim.hit.index === idx) d.classList.add('hit');
      if(dyingHere) d.classList.add('dying');
      if(anim.entering.some(x => x.side === side && x.index === idx)) d.classList.add('entering');

      d.innerHTML = `<div class="num">${card.value}</div>`;
      container.appendChild(d);
    });
  }

  function refreshBattle(){
    if(!state.battle) return;
    ui.enemyReserve.textContent = state.battle.enemyReserve.length;
    ui.playerReserve.textContent = state.battle.playerReserve.length;
    renderField(ui.enemyField, state.battle.enemyField, 'enemy');
    renderField(ui.playerField, state.battle.playerField, 'player');
    refreshMeta();
  }

  async function refillSideAnimated(side){
    const b = state.battle;
    const fieldKey = side === 'player' ? 'playerField' : 'enemyField';
    const reserveKey = side === 'player' ? 'playerReserve' : 'enemyReserve';
    const field = [...b[fieldKey]];
    const reserve = [...b[reserveKey]];

    for(let i=0;i<field.length;i++){
      if(!field[i] && reserve.length > 0){
        const idx = Math.floor(Math.random() * reserve.length);
        const drawn = reserve[idx];
        b.animate.entering = [{ side, index:i, fromReserveIndex:idx }];
        setToast(`${side === 'player' ? '我方' : '對方'}補上 ${drawn.value}`);
        refreshBattle();
        await sleep(260);
        reserve.splice(idx,1);
        field[i] = drawn;
        b[fieldKey] = field;
        b[reserveKey] = reserve;
        refreshBattle();
        await sleep(300);
        b.animate.entering = [];
        refreshBattle();
      }
    }
  }

  function endBattle(win){
    state.battle.over = true;
    clearSelection();
    state.busy = false;

    if(win){
      const goldGain = 5 + state.profile.stage * 2;
      state.profile.gold += goldGain;
      const items = [`金幣 +${goldGain}`];
      let gotNew = null;

      if(Math.random() < 0.45){
        const role = roles[Math.floor(Math.random() * roles.length)];
        const base = Math.max(4, Math.min(14, 4 + Math.floor(state.profile.stage * 0.55) + Math.floor(Math.random() * 3)));
        gotNew = newOwnedCard(role, base);
        state.profile.owned.push(gotNew);
        items.push(`新卡：${gotNew.role} ${cardPower(gotNew)}`);
      }

      state.rewardData = { win:true, items };
      state.profile.stage += 1;
      saveProfile();
      refreshMeta();
      ui.rewardTitle.textContent = '獲勝';
      ui.rewardSub.textContent = '這關打完了，拿資源去養牌。';
      ui.rewardItems.innerHTML = items.map(x => `<div class="reward-item">${x}</div>`).join('');
      showOverlay(ui.rewardOverlay);
    }else{
      state.rewardData = { win:false, items:[] };
      ui.rewardTitle.textContent = '失敗';
      ui.rewardSub.textContent = '這把打不過，先回去調整牌組或升級。';
      ui.rewardItems.innerHTML = `<div class="reward-item">沒有通關獎勵</div>`;
      showOverlay(ui.rewardOverlay);
    }
  }

  function judgeWinner(){
    const p = totalRemaining('player');
    const e = totalRemaining('enemy');

    if(e <= 0 && p <= 0){
      setToast('同歸於盡');
      endBattle(false);
      return true;
    }
    if(e <= 0){
      setToast('你贏了');
      endBattle(true);
      return true;
    }
    if(p <= 0){
      setToast('你輸了');
      endBattle(false);
      return true;
    }
    return false;
  }

  async function postResolve(){
    await refillSideAnimated('player');
    await refillSideAnimated('enemy');
    if(judgeWinner()) return;

    state.battle.turn = state.battle.turn === 'player' ? 'enemy' : 'player';
    clearSelection();
    refreshBattle();

    if(state.battle.turn === 'player'){
      state.busy = false;
      setToast('輪到你了');
    }else{
      setToast('對方出手中');
      await sleep(560);
      state.busy = false;
      aiTurn();
    }
  }

  async function resolveAttack(side, attackerIndex, defenderIndex){
    if(state.busy || !state.battle || state.battle.over) return;

    const b = state.battle;
    const attackFieldKey = side === 'player' ? 'playerField' : 'enemyField';
    const defendSide = side === 'player' ? 'enemy' : 'player';
    const defendFieldKey = defendSide === 'player' ? 'playerField' : 'enemyField';
    const attackField = [...b[attackFieldKey]];
    const defendField = [...b[defendFieldKey]];
    const attacker = attackField[attackerIndex];
    const defender = defendField[defenderIndex];
    if(!attacker || !defender) return;

    state.busy = true;
    clearSelection();

    b.animate.attacking = { side, index:attackerIndex };
    b.animate.hit = null;
    b.animate.dying = [];
    refreshBattle();
    setToast(`${attacker.value} 攻擊 ${defender.value}`);
    await sleep(260);

    b.animate.hit = { side:defendSide, index:defenderIndex };
    refreshBattle();
    await sleep(220);

    const aBefore = attacker.value;
    const dBefore = defender.value;
    const aAfter = Math.max(0, aBefore - dBefore);
    const dAfter = Math.max(0, dBefore - aBefore);

    attackField[attackerIndex] = aAfter > 0 ? { ...attacker, value:aAfter } : attacker;
    defendField[defenderIndex] = dAfter > 0 ? { ...defender, value:dAfter } : defender;

    if(aAfter <= 0) b.animate.dying.push({ side, index:attackerIndex });
    if(dAfter <= 0) b.animate.dying.push({ side:defendSide, index:defenderIndex });

    if(aAfter <= 0 && dAfter <= 0) setToast('雙方都倒下');
    else if(aAfter <= 0) setToast(`${aBefore} 倒下，對面剩 ${dAfter}`);
    else if(dAfter <= 0) setToast(`${dBefore} 倒下，我方剩 ${aAfter}`);
    else setToast(`剩 ${aAfter} 對 ${dAfter}`);

    b[attackFieldKey] = attackField;
    b[defendFieldKey] = defendField;
    refreshBattle();
    await sleep(360);

    if(aAfter <= 0) attackField[attackerIndex] = null;
    if(dAfter <= 0) defendField[defenderIndex] = null;
    b[attackFieldKey] = attackField;
    b[defendFieldKey] = defendField;

    b.animate.attacking = null;
    b.animate.hit = null;
    b.animate.dying = [];
    refreshBattle();
    await sleep(240);

    await postResolve();
  }

  function aiTurn(){
    if(!state.battle || state.battle.over) return;
    const attackers = state.battle.enemyField.map((c,i) => c ? {i,c} : null).filter(Boolean);
    const targets = state.battle.playerField.map((c,i) => c ? {i,c} : null).filter(Boolean);

    let best = null;
    for(const a of attackers){
      for(const t of targets){
        const aAfter = a.c.value - t.c.value;
        const tAfter = t.c.value - a.c.value;
        let score = 0;
        if(tAfter <= 0) score += 1000 + t.c.value;
        if(aAfter > 0) score += 300 + aAfter;
        if(aAfter <= 0) score -= a.c.value * 0.6;
        score += t.c.value * 0.1;
        if(!best || score > best.score) best = {ai:a.i, ti:t.i, score};
      }
    }
    resolveAttack('enemy', best.ai, best.ti);
  }

  function renderDeckEditor(){
    ui.deckCountPill.textContent = `已選 ${state.profile.deck.length} / 6`;
    ui.deckGrid.innerHTML = state.profile.owned.map(card => {
      const selected = state.profile.deck.includes(card.id);
      return `
        <div class="owned-card ${selected ? 'sel' : ''}" data-card="${card.id}">
          <div class="owned-top">
            <div>
              <div class="role">${card.role}</div>
              <div class="power-big">${cardPower(card)}</div>
            </div>
            <div class="lv">Lv.${card.level}</div>
          </div>
          <div class="owned-btns">
            <button class="tiny-btn" data-toggle="${card.id}">${selected ? '移出牌組' : '加入牌組'}</button>
            <div class="lv">基礎 ${card.base}</div>
          </div>
        </div>
      `;
    }).join('');

    ui.deckGrid.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.toggle);
        const inDeck = state.profile.deck.includes(id);
        if(inDeck){
          if(state.profile.deck.length <= 1) return;
          state.profile.deck = state.profile.deck.filter(x => x !== id);
        }else{
          if(state.profile.deck.length >= 6) return;
          state.profile.deck.push(id);
        }
        saveProfile();
        refreshMeta();
        renderDeckEditor();
      });
    });
  }

  function renderUpgradeEditor(){
    ui.upgradeGold.textContent = `金幣 ${state.profile.gold}`;
    ui.upgradeGrid.innerHTML = state.profile.owned.map(card => {
      const cost = card.level * 6;
      return `
        <div class="owned-card">
          <div class="owned-top">
            <div>
              <div class="role">${card.role}</div>
              <div class="power-big">${cardPower(card)}</div>
            </div>
            <div class="lv">Lv.${card.level}</div>
          </div>
          <div class="owned-btns">
            <button class="tiny-btn" data-up="${card.id}" ${state.profile.gold < cost ? 'disabled' : ''}>升級 ${cost}</button>
            <div class="lv">基礎 ${card.base}</div>
          </div>
        </div>
      `;
    }).join('');

    ui.upgradeGrid.querySelectorAll('[data-up]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.up);
        const card = ownedById(id);
        const cost = card.level * 6;
        if(state.profile.gold < cost) return;
        state.profile.gold -= cost;
        card.level += 1;
        card.base += 1;
        saveProfile();
        refreshMeta();
        renderUpgradeEditor();
        renderDeckEditor();
      });
    });
  }

  $('startBattleBtn').addEventListener('click', startBattle);
  $('editDeckBtn').addEventListener('click', () => {
    renderDeckEditor();
    showOverlay(ui.deckOverlay);
  });
  $('upgradeBtn').addEventListener('click', () => {
    renderUpgradeEditor();
    showOverlay(ui.upgradeOverlay);
  });
  $('closeMenuBtn').addEventListener('click', () => {
    if(state.battle && !state.battle.over) showOverlay(null);
  });
  $('deckBackBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('upgradeBackBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('rewardMenuBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('nextStageBtn').addEventListener('click', () => {
    if(state.rewardData?.win){
      startBattle();
    }else{
      showOverlay(ui.menuOverlay);
    }
  });
  $('menuBtn').addEventListener('click', () => {
    refreshMeta();
    showOverlay(ui.menuOverlay);
  });
  $('resetBtn').addEventListener('click', () => {
    localStorage.removeItem(saveKey);
    loadProfile();
    refreshMeta();
    renderDeckEditor();
    renderUpgradeEditor();
    setToast('進度已重置');
    showOverlay(ui.menuOverlay);
  });

  loadProfile();
  refreshMeta();
  renderDeckEditor();
  renderUpgradeEditor();
  setToast('從主頁開始戰鬥');
})();
</script>
