<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no" />
<title>卡牌對決</title>
<style>
  :root{
    --bg:#070910;
    --panel:#121726;
    --line:#29314a;
    --text:#eef2ff;
    --muted:#99a5cb;
    --player:#7dd3fc;
    --enemy:#f9a8d4;
    --gold:#fcd34d;
    --ice:#93c5fd;
    --select:#a78bfa;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;height:100%;
    background:#070910;
    color:var(--text);
    font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;
    overflow:hidden;
  }
  body{position:fixed;inset:0}
  .app{
    height:100dvh;
    max-width:560px;
    margin:0 auto;
    padding:
      calc(env(safe-area-inset-top) + 8px)
      calc(env(safe-area-inset-right) + 8px)
      calc(env(safe-area-inset-bottom) + 8px)
      calc(env(safe-area-inset-left) + 8px);
    position:relative;
    background:linear-gradient(180deg,#0c1020,#06070d 55%,#05060a);
  }

  .battle{
    height:100%;
    display:grid;
    grid-template-rows:28px minmax(0,1fr) minmax(0,1fr) 34px 48px;
    gap:10px;
  }
  .corner-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:0 2px;
  }
  .chip{
    min-width:58px;height:28px;
    display:flex;align-items:center;justify-content:center;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    color:#dde5ff;font-size:12px;font-weight:1000;
  }
  .field{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    min-height:0;
  }

  .card{
    min-height:100%;
    border-radius:24px;
    border:2px solid var(--line);
    background:
      radial-gradient(circle at top, rgba(255,255,255,.08), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      var(--panel);
    box-shadow:0 18px 40px rgba(0,0,0,.28);
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:12px 8px 10px;
    transition:
      transform .22s ease,
      opacity .22s ease,
      filter .18s ease,
      box-shadow .18s ease,
      border-color .18s ease;
    user-select:none;
  }
  .player{background:
      radial-gradient(circle at top, rgba(125,211,252,.16), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      #142335;}
  .enemy{background:
      radial-gradient(circle at top, rgba(249,168,212,.16), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
      #281c2b;}
  .card.selectable{border-color:rgba(125,211,252,.42)}
  .card.selected{
    border-color:var(--select);
    box-shadow:0 0 0 3px rgba(167,139,250,.24),0 18px 40px rgba(0,0,0,.28);
  }
  .card.targetable{
    border-color:rgba(252,211,77,.55);
    box-shadow:0 0 0 3px rgba(252,211,77,.18),0 18px 40px rgba(0,0,0,.28);
  }
  .card.frozen{filter:saturate(.72) brightness(.94)}
  .card.hit{
    box-shadow:0 0 0 4px rgba(252,211,77,.22),0 18px 40px rgba(0,0,0,.28);
    filter:brightness(1.14);
  }
  .card.dying{
    transform:scale(.82);
    opacity:.06;
    filter:grayscale(1);
  }
  .card.entering{
    animation:flipIn .42s ease;
    border-color:rgba(252,211,77,.55);
  }
  .card.shield-pop::after{
    content:"";
    position:absolute;inset:8px;
    border-radius:20px;
    border:3px solid rgba(252,211,77,.7);
    animation:shieldPulse .45s ease;
    pointer-events:none;
  }
  .card.slash::before{
    content:"";
    position:absolute;
    left:12%;right:12%;top:48%;
    height:4px;
    transform:rotate(-18deg);
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.96), transparent);
    box-shadow:0 0 10px rgba(255,255,255,.55);
    animation:slashFx .26s ease;
    pointer-events:none;
  }
  @keyframes flipIn{
    0%{transform:rotateY(90deg) scale(.88);opacity:.12}
    100%{transform:rotateY(0) scale(1);opacity:1}
  }
  @keyframes shieldPulse{
    0%{opacity:0;transform:scale(.92)}
    30%{opacity:1}
    100%{opacity:0;transform:scale(1.08)}
  }
  @keyframes slashFx{
    0%{opacity:0;transform:rotate(-18deg) scaleX(.2)}
    30%{opacity:1}
    100%{opacity:0;transform:rotate(-18deg) scaleX(1.15)}
  }

  .role{
    text-align:center;
    font-size:12px;
    font-weight:1000;
    color:#e1e8ff;
    letter-spacing:.3px;
  }
  .num{
    flex:1;
    display:flex;align-items:center;justify-content:center;
    font-size:48px;
    line-height:1;
    font-weight:1000;
  }
  .badges{
    min-height:22px;
    display:flex;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
  }
  .badge{
    padding:4px 8px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    font-size:11px;
    font-weight:1000;
    color:#d9e2ff;
  }
  .badge.shield{color:var(--gold)}
  .badge.freeze{color:var(--ice)}
  .dead{
    border-radius:24px;
    border:2px dashed rgba(255,255,255,.16);
    background:rgba(255,255,255,.03);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#8d97bd;
    gap:6px;
  }
  .dead .x{font-size:34px;font-weight:1000;line-height:1}
  .dead .t{font-size:12px;font-weight:900}

  .flash-note{
    position:absolute;
    left:50%;
    top:calc(env(safe-area-inset-top) + 34px);
    transform:translateX(-50%);
    min-width:120px;
    max-width:78%;
    text-align:center;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.09);
    font-size:13px;
    font-weight:1000;
    color:#e7edff;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
    z-index:3;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .flash-note.show{opacity:1}
  .version-badge{
    position:absolute;
    right:10px;
    bottom:10px;
    z-index:20;
    padding:6px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    color:#cfd8ff;
    font-size:11px;
    font-weight:1000;
    letter-spacing:.4px;
    backdrop-filter:blur(6px);
    pointer-events:none;
    box-shadow:0 8px 18px rgba(0,0,0,.18);
  }

  .bottom-row{
    display:flex;justify-content:space-between;align-items:center;padding:0 2px;
  }
  .menu-row{display:flex;justify-content:center;align-items:center}
  .btn{
    height:48px;min-width:96px;
    border:none;border-radius:16px;
    background:linear-gradient(180deg,#2c345a,#242949);
    color:#eef2ff;font-size:14px;font-weight:1000;
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 10px 18px rgba(0,0,0,.18);
  }
  .btn:active{transform:scale(.985)}

  .overlay{
    position:absolute;inset:0;
    display:none;align-items:center;justify-content:center;
    background:rgba(4,6,12,.58);
    backdrop-filter:blur(10px);
    z-index:10;padding:14px;
  }
  .overlay.show{display:flex}
  .sheet{
    width:100%;max-height:100%;
    background:rgba(19,24,39,.97);
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:0 24px 70px rgba(0,0,0,.36);
    display:grid;
    grid-template-rows:auto auto 1fr auto;
    overflow:hidden;
  }
  .sheet.slim{grid-template-rows:auto 1fr auto;max-width:430px}
  .sheet-hd{padding:18px 18px 10px}
  .sheet-ttl{font-size:28px;font-weight:1000}
  .sheet-sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.6}
  .resource{padding:0 18px 12px;display:flex;gap:8px;flex-wrap:wrap}
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 12px;border-radius:999px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.07);
    font-size:13px;font-weight:1000;
  }
  .pill.gold{color:var(--gold)}
  .sheet-bd{padding:0 18px 18px;overflow:auto}
  .sheet-ft{padding:12px 18px 18px;display:flex;gap:10px}
  .sheet-ft .btn,.menu-actions .btn{width:100%}
  .menu-actions{display:grid;gap:10px}
  .btn.alt{background:linear-gradient(180deg,#29314e,#212743)}

  .deck-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .owned{
    border-radius:18px;border:1px solid var(--line);
    background:rgba(255,255,255,.04);padding:12px;display:grid;gap:10px;
  }
  .owned.sel{
    border-color:rgba(125,211,252,.45);
    box-shadow:0 0 0 3px rgba(125,211,252,.14);
  }
  .owned-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .owned-role{font-size:12px;color:var(--muted);font-weight:1000}
  .power-big{font-size:30px;line-height:1;font-weight:1000}
  .lv{
    font-size:12px;color:#dce4ff;padding:5px 8px;border-radius:999px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);font-weight:1000;
  }
  .owned-btns{display:grid;grid-template-columns:1fr auto;gap:8px}
  .tiny-btn{
    height:36px;border:none;border-radius:14px;
    background:linear-gradient(180deg,#2d355a,#252b49);
    color:#eef2ff;font-size:13px;font-weight:1000;
    border:1px solid rgba(255,255,255,.07);
  }
  .tiny-btn:disabled{opacity:.45}

  .reward-box{padding:18px;text-align:center}
  .reward-title{font-size:26px;font-weight:1000;margin-bottom:8px}
  .reward-items{margin-top:12px;display:grid;gap:10px}
  .reward-item{
    padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);font-size:15px;font-weight:1000;
  }
</style>
</head>
<body>
<div class="app">
  <div class="flash-note" id="flashNote"></div>

  <div class="battle">
    <div class="corner-row">
      <div class="chip" id="enemyReserve">3</div>
      <div></div>
    </div>

    <div class="field" id="enemyField"></div>
    <div class="field" id="playerField"></div>

    <div class="bottom-row">
      <div class="chip" id="playerReserve">3</div>
      <div class="chip" id="goldTiny">金幣 0</div>
    </div>

    <div class="menu-row">
      <button class="btn" id="menuBtn">主頁</button>
    </div>
  </div>

  <div class="overlay show" id="menuOverlay">
    <div class="sheet slim">
      <div class="sheet-hd">
        <div class="sheet-ttl">卡牌對決</div>
        <div class="sheet-sub">畫面只留必要資訊。劍士普通互砍，弓箭手主動攻擊不反傷，魔法師會冰凍，盾衛出手前上盾。</div>
      </div>
      <div class="resource">
        <div class="pill gold" id="menuGold">金幣 0</div>
        <div class="pill" id="menuStage">關卡 1</div>
        <div class="pill" id="menuDeck">牌組 6 / 6</div>
      </div>
      <div class="sheet-bd">
        <div class="menu-actions">
          <button class="btn" id="startBattleBtn">開始戰鬥</button>
          <button class="btn alt" id="editDeckBtn">編輯牌組</button>
          <button class="btn alt" id="upgradeBtn">升級卡牌</button>
          <button class="btn alt" id="resetBtn">重置進度</button>
        </div>
      </div>
      <div class="sheet-ft">
        <button class="btn alt" id="closeMenuBtn">回戰場</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="deckOverlay">
    <div class="sheet">
      <div class="sheet-hd">
        <div class="sheet-ttl">編輯牌組</div>
        <div class="sheet-sub">固定帶 6 張。戰鬥中會直接顯示職業。</div>
      </div>
      <div class="resource">
        <div class="pill" id="deckCountPill">已選 6 / 6</div>
      </div>
      <div class="sheet-bd">
        <div class="deck-grid" id="deckGrid"></div>
      </div>
      <div class="sheet-ft">
        <button class="btn alt" id="deckBackBtn">返回</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="upgradeOverlay">
    <div class="sheet">
      <div class="sheet-hd">
        <div class="sheet-ttl">升級卡牌</div>
        <div class="sheet-sub">每升 1 級，基礎值 +1。</div>
      </div>
      <div class="resource">
        <div class="pill gold" id="upgradeGold">金幣 0</div>
      </div>
      <div class="sheet-bd">
        <div class="deck-grid" id="upgradeGrid"></div>
      </div>
      <div class="sheet-ft">
        <button class="btn alt" id="upgradeBackBtn">返回</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="rewardOverlay">
    <div class="sheet slim">
      <div class="reward-box">
        <div class="reward-title" id="rewardTitle">獲勝</div>
        <div class="sheet-sub" id="rewardSub">這關過了。</div>
        <div class="reward-items" id="rewardItems"></div>
      </div>
      <div class="sheet-ft">
        <button class="btn" id="nextStageBtn">下一關</button>
        <button class="btn alt" id="rewardMenuBtn">回主頁</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const saveKey = 'card_duel_progress_v3';
  const GAME_VERSION = 'v4.1.0';
  const roles = ['劍士','弓箭手','魔法師','盾衛'];

  const ui = {
    enemyReserve: $('enemyReserve'),
    playerReserve: $('playerReserve'),
    goldTiny: $('goldTiny'),
    enemyField: $('enemyField'),
    playerField: $('playerField'),
    flashNote: $('flashNote'),
    menuOverlay: $('menuOverlay'),
    deckOverlay: $('deckOverlay'),
    upgradeOverlay: $('upgradeOverlay'),
    rewardOverlay: $('rewardOverlay'),
    menuGold: $('menuGold'),
    menuStage: $('menuStage'),
    menuDeck: $('menuDeck'),
    deckCountPill: $('deckCountPill'),
    deckGrid: $('deckGrid'),
    upgradeGrid: $('upgradeGrid'),
    upgradeGold: $('upgradeGold'),
    rewardTitle: $('rewardTitle'),
    rewardSub: $('rewardSub'),
    rewardItems: $('rewardItems'),
  };

  const state = {
    profile: null,
    battle: null,
    selection: null,
    busy: false,
    noteTimer: null,
  };

  let nextCardId = 1;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function showNote(text){
    clearTimeout(state.noteTimer);
    ui.flashNote.textContent = text;
    ui.flashNote.classList.add('show');
    state.noteTimer = setTimeout(() => ui.flashNote.classList.remove('show'), 700);
  }

  function newOwnedCard(role, base, level=1){
    return { id: nextCardId++, role, base, level };
  }
  function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
  function cardPower(card){ return card.base + card.level - 1; }
  function saveProfile(){ localStorage.setItem(saveKey, JSON.stringify(state.profile)); }
  function ownedById(id){ return state.profile.owned.find(c => c.id === id); }

  function defaultProfile(){
    const owned = [
      newOwnedCard('劍士', 5),
      newOwnedCard('弓箭手', 4),
      newOwnedCard('魔法師', 5),
      newOwnedCard('盾衛', 6),
      newOwnedCard('劍士', 6),
      newOwnedCard('弓箭手', 5),
      newOwnedCard('魔法師', 4),
      newOwnedCard('盾衛', 7),
    ];
    return { gold: 12, stage: 1, owned, deck: owned.slice(0,6).map(c => c.id) };
  }

  function loadProfile(){
    const raw = localStorage.getItem(saveKey);
    if(!raw){
      state.profile = defaultProfile();
      saveProfile();
      return;
    }
    try{
      state.profile = JSON.parse(raw);
      nextCardId = Math.max(1, ...state.profile.owned.map(c => c.id)) + 1;
    }catch{
      state.profile = defaultProfile();
      saveProfile();
    }
  }

  function showOverlay(which){
    [ui.menuOverlay, ui.deckOverlay, ui.upgradeOverlay, ui.rewardOverlay].forEach(el => el.classList.remove('show'));
    if(which) which.classList.add('show');
  }

  function refreshMeta(){
    ui.menuGold.textContent = `金幣 ${state.profile.gold}`;
    ui.menuStage.textContent = `關卡 ${state.profile.stage}`;
    ui.menuDeck.textContent = `牌組 ${state.profile.deck.length} / 6`;
    ui.upgradeGold.textContent = `金幣 ${state.profile.gold}`;
    ui.deckCountPill.textContent = `已選 ${state.profile.deck.length} / 6`;
    ui.goldTiny.textContent = `金幣 ${state.profile.gold}`;
  }

  function makeBattleDeckFromIds(ids, side){
    return ids.map(id => {
      const owned = ownedById(id);
      return { refId: owned.id, role: owned.role, value: cardPower(owned), side, shield:0, frozen:0 };
    });
  }

  function enemyDeckForStage(stage){
    const deck = [];
    const roleCount = Math.min(4, 2 + Math.floor((stage - 1) / 2));
    for(let i=0;i<6;i++){
      const role = roles[Math.floor(Math.random() * roleCount)];
      const base = Math.max(3, 4 + Math.floor((stage - 1) * 0.6) + Math.floor(Math.random() * 3));
      deck.push({ refId:`e_${stage}_${i}`, role, value:base, side:'enemy', shield:0, frozen:0, entryShielded:false });
    }
    return deck;
  }

  function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function applyEntryShield(card){
    if(card && card.role === '盾衛' && !card.entryShielded){
      card.shield = 1;
      card.entryShielded = true;
      return true;
    }
    return false;
  }

  function applyEntryShieldsForSide(side){
    const field = [...getField(side)];
    let changed = false;
    for(let i=0;i<field.length;i++){
      if(field[i]){
        const c = { ...field[i] };
        if(applyEntryShield(c)){
          field[i] = c;
          changed = true;
        }
      }
    }
    if(changed) setField(side, field);
    return changed;
  }

  function startBattle(){
    if(state.profile.deck.length !== 6) return;
    const playerFull = shuffle(makeBattleDeckFromIds(state.profile.deck, 'player')).map(c => ({...c, entryShielded:false}));
    const enemyFull = shuffle(enemyDeckForStage(state.profile.stage));
    state.battle = {
      playerField: playerFull.slice(0,3),
      enemyField: enemyFull.slice(0,3),
      playerReserve: playerFull.slice(3),
      enemyReserve: enemyFull.slice(3),
      animate: { lunge:null, hit:null, dying:[], entering:[], shielding:[] },
      turn: 'player',
      over: false
    };
    applyEntryShieldsForSide('player');
    applyEntryShieldsForSide('enemy');
    state.selection = null;
    state.busy = false;
    refreshBattle();
    showOverlay(null);
    ensureTurnCanAct();
  }

  function getField(side){ return side === 'player' ? state.battle.playerField : state.battle.enemyField; }
  function getReserve(side){ return side === 'player' ? state.battle.playerReserve : state.battle.enemyReserve; }
  function setField(side, v){ side === 'player' ? state.battle.playerField = v : state.battle.enemyField = v; }
  function setReserve(side, v){ side === 'player' ? state.battle.playerReserve = v : state.battle.enemyReserve = v; }
  function totalRemaining(side){ return getField(side).filter(Boolean).length + getReserve(side).length; }
  function clearSelection(){ state.selection = null; }

  function renderBadges(card){
    const out = [];
    if(card.shield > 0) out.push(`<span class="badge shield">盾</span>`);
    if(card.frozen > 0) out.push(`<span class="badge freeze">冰${card.frozen}</span>`);
    return out.join('');
  }

  function deadSlotHTML(){
    return `<div class="dead"><div class="x">✕</div><div class="t">空位</div></div>`;
  }

  function cardTransform(side, idx){
    const a = state.battle.animate.lunge;
    if(!a || a.side !== side || a.index !== idx) return '';
    return `transform: translate(${a.tx}px, ${a.ty}px) scale(1.04); z-index:2;`;
  }

  function renderField(container, list, side){
    container.innerHTML = '';
    list.forEach((card, idx) => {
      const anim = state.battle.animate;
      const dyingHere = anim.dying.some(x => x.side === side && x.index === idx);
      const shieldingHere = anim.shielding.some(x => x.side === side && x.index === idx);

      if(!card){
        container.insertAdjacentHTML('beforeend', deadSlotHTML());
        return;
      }

      const d = document.createElement('div');
      d.className = `card ${side === 'player' ? 'player' : 'enemy'}`;
      d.dataset.side = side;
      d.dataset.index = idx;

      if(card.frozen > 0) d.classList.add('frozen');
      if(side === 'player' && state.battle.turn === 'player' && !state.busy && !state.battle.over && card.frozen <= 0){
        d.classList.add('selectable');
        if(state.selection === idx) d.classList.add('selected');
        d.addEventListener('click', () => {
          state.selection = idx;
          refreshBattle();
        });
      }

      if(side === 'enemy' && state.battle.turn === 'player' && state.selection !== null && !state.busy && !state.battle.over){
        d.classList.add('targetable');
        d.addEventListener('click', () => resolveAttack('player', state.selection, idx));
      }

      if(anim.hit && anim.hit.side === side && anim.hit.index === idx) d.classList.add('hit','slash');
      if(dyingHere) d.classList.add('dying');
      if(anim.entering.some(x => x.side === side && x.index === idx)) d.classList.add('entering');
      if(shieldingHere) d.classList.add('shield-pop');

      d.style.cssText += cardTransform(side, idx);
      d.innerHTML = `
        <div class="role">${card.role}</div>
        <div class="num">${card.value}</div>
        <div class="badges">${renderBadges(card)}</div>
      `;
      container.appendChild(d);
    });
  }

  function refreshBattle(){
    if(!state.battle) return;
    ui.enemyReserve.textContent = state.battle.enemyReserve.length;
    ui.playerReserve.textContent = state.battle.playerReserve.length;
    renderField(ui.enemyField, state.battle.enemyField, 'enemy');
    renderField(ui.playerField, state.battle.playerField, 'player');
    refreshMeta();
  }

  function chooseShieldAlly(side, attackerIndex){
    const field = getField(side);
    const candidates = field
      .map((card, idx) => ({card, idx}))
      .filter(x => x.card && x.idx !== attackerIndex)
      .sort((a,b) => {
        if(a.card.shield !== b.card.shield) return a.card.shield - b.card.shield;
        return a.card.value - b.card.value;
      });
    return candidates[0]?.idx ?? null;
  }

  function decrementFrozenForSide(side){
    const field = getField(side).map(card => {
      if(!card) return null;
      if(card.frozen > 0) return { ...card, frozen: card.frozen - 1 };
      return card;
    });
    setField(side, field);
  }

  function sideHasAvailableAttacker(side){
    return getField(side).some(card => card && card.frozen <= 0);
  }

  async function ensureTurnCanAct(){
    if(!state.battle || state.battle.over) return;
    const side = state.battle.turn;
    if(sideHasAvailableAttacker(side)) return;

    state.busy = true;
    showNote(side === 'player' ? '我方全員冰凍，回合跳過' : '對方全員冰凍，回合跳過');
    await sleep(520);
    decrementFrozenForSide(side);
    state.battle.turn = side === 'player' ? 'enemy' : 'player';
    state.busy = false;
    refreshBattle();

    if(judgeWinner()) return;
    if(state.battle.turn === 'enemy'){
      await sleep(420);
      aiTurn();
    } else {
      await ensureTurnCanAct();
    }
  }

  async function refillSideAnimated(side){
    const field = [...getField(side)];
    const reserve = [...getReserve(side)];

    for(let i=0;i<field.length;i++){
      if(!field[i] && reserve.length > 0){
        const idx = Math.floor(Math.random() * reserve.length);
        const drawn = reserve[idx];
        state.battle.animate.entering = [{ side, index:i }];
        refreshBattle();
        await sleep(220);
        reserve.splice(idx, 1);
        const nextCard = { ...drawn };
        const hadEntryShield = applyEntryShield(nextCard);
        field[i] = nextCard;
        setField(side, field);
        setReserve(side, reserve);
        if(hadEntryShield){
          state.battle.animate.shielding = [{ side, index:i }];
        }
        refreshBattle();
        await sleep(260);
        state.battle.animate.entering = [];
        state.battle.animate.shielding = [];
        refreshBattle();
      }
    }
  }

  function endBattle(win){
    state.battle.over = true;
    state.busy = false;
    clearSelection();

    if(win){
      const goldGain = 5 + state.profile.stage * 2;
      state.profile.gold += goldGain;
      const items = [`金幣 +${goldGain}`];
      if(Math.random() < 0.42){
        const role = roles[Math.floor(Math.random() * roles.length)];
        const base = Math.max(4, Math.min(14, 4 + Math.floor(state.profile.stage * 0.55) + Math.floor(Math.random() * 3)));
        const card = newOwnedCard(role, base);
        state.profile.owned.push(card);
        items.push(`新卡：${card.role} ${cardPower(card)}`);
      }
      state.profile.stage += 1;
      saveProfile();
      refreshMeta();
      ui.rewardTitle.textContent = '獲勝';
      ui.rewardSub.textContent = '這關打完了，拿資源去養牌。';
      ui.rewardItems.innerHTML = items.map(x => `<div class="reward-item">${x}</div>`).join('');
      showOverlay(ui.rewardOverlay);
    } else {
      ui.rewardTitle.textContent = '失敗';
      ui.rewardSub.textContent = '先回去調整牌組或升級。';
      ui.rewardItems.innerHTML = `<div class="reward-item">沒有通關獎勵</div>`;
      showOverlay(ui.rewardOverlay);
    }
  }

  function judgeWinner(){
    const p = totalRemaining('player');
    const e = totalRemaining('enemy');
    if(e <= 0 && p <= 0){ endBattle(false); return true; }
    if(e <= 0){ endBattle(true); return true; }
    if(p <= 0){ endBattle(false); return true; }
    return false;
  }

  function getCardCenter(side, idx){
    const el = document.querySelector(`[data-side="${side}"][data-index="${idx}"]`);
    if(!el) return null;
    const rect = el.getBoundingClientRect();
    return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
  }

  async function resolveAttack(side, attackerIndex, defenderIndex){
    if(state.busy || !state.battle || state.battle.over) return;

    const defendSide = side === 'player' ? 'enemy' : 'player';
    const attackerField = [...getField(side)];
    const defenderField = [...getField(defendSide)];
    const attacker = clone(attackerField[attackerIndex]);
    const defender = clone(defenderField[defenderIndex]);
    if(!attacker || !defender || attacker.frozen > 0) return;

    state.busy = true;
    clearSelection();

    // 出手位移
    const aCenter = getCardCenter(side, attackerIndex);
    const dCenter = getCardCenter(defendSide, defenderIndex);
    if(aCenter && dCenter){
      state.battle.animate.lunge = {
        side, index:attackerIndex,
        tx:(dCenter.x - aCenter.x) * 0.45,
        ty:(dCenter.y - aCenter.y) * 0.45
      };
      refreshBattle();
      await sleep(240);
    }

    // 命中
    state.battle.animate.hit = { side:defendSide, index:defenderIndex };
    refreshBattle();
    await sleep(180);

    let attackDamage = attacker.value;
    let counterDamage = 0;

    if(defender.shield > 0){
      defender.shield = 0;
      attackDamage = 0;
      showNote('護盾擋住傷害');
    }

    const attackerIsArcher = attacker.role === '弓箭手';
    const defenderCanCounter = defender.frozen <= 0;

    if(!attackerIsArcher && defenderCanCounter){
      counterDamage = defender.value;
      if(attacker.shield > 0){
        attacker.shield = 0;
        counterDamage = 0;
        showNote('護盾擋住反擊');
      }
    }

    const aAfter = Math.max(0, attacker.value - counterDamage);
    const dAfter = Math.max(0, defender.value - attackDamage);

    const freezeMsgs = [];
    if(attacker.role === '魔法師' && dAfter > 0){
      defender.frozen = Math.max(defender.frozen, 2);
      freezeMsgs.push('魔法師冰凍目標');
    }
    if(defender.role === '魔法師' && aAfter > 0){
      attacker.frozen = Math.max(attacker.frozen, 2);
      freezeMsgs.push('魔法師反制冰凍');
    }

    attacker.value = aAfter;
    defender.value = dAfter;

    attackerField[attackerIndex] = attacker;
    defenderField[defenderIndex] = defender;
    setField(side, attackerField);
    setField(defendSide, defenderField);

    state.battle.animate.dying = [];
    if(aAfter <= 0) state.battle.animate.dying.push({ side, index:attackerIndex });
    if(dAfter <= 0) state.battle.animate.dying.push({ side:defendSide, index:defenderIndex });

    refreshBattle();
    await sleep(300);

    if(freezeMsgs.length){
      showNote(freezeMsgs.join(' / '));
      refreshBattle();
      await sleep(280);
    }

    if(aAfter <= 0) attackerField[attackerIndex] = null;
    if(dAfter <= 0) defenderField[defenderIndex] = null;
    setField(side, attackerField);
    setField(defendSide, defenderField);

    state.battle.animate.lunge = null;
    state.battle.animate.hit = null;
    state.battle.animate.dying = [];
    refreshBattle();
    await sleep(220);

    await refillSideAnimated('player');
    await refillSideAnimated('enemy');
    if(judgeWinner()) return;

    decrementFrozenForSide(side);
    state.battle.turn = side === 'player' ? 'enemy' : 'player';
    state.busy = false;
    refreshBattle();

    if(state.battle.turn === 'enemy'){
      await sleep(380);
      aiTurn();
    } else {
      await ensureTurnCanAct();
    }
  }

  function aiTurn(){
    if(!state.battle || state.battle.over || state.busy) return;
    if(!sideHasAvailableAttacker('enemy')){
      ensureTurnCanAct();
      return;
    }

    const attackers = state.battle.enemyField
      .map((c,i) => c ? {i,c} : null)
      .filter(Boolean)
      .filter(x => x.c.frozen <= 0);

    const targets = state.battle.playerField
      .map((c,i) => c ? {i,c} : null)
      .filter(Boolean);

    const plans = [];
    for(const a of attackers){
      for(const t of targets){
        let score = 0;
        const dmg = t.c.shield > 0 ? 0 : a.c.value;
        if(dmg >= t.c.value) score += 1000 + t.c.value;
        if(a.c.role === '弓箭手') score += 180;
        if(a.c.role === '魔法師') score += 220;
        if(a.c.role === '盾衛') score += 90;
        if(t.c.shield > 0) score -= 150;
        score += t.c.value * 0.18;
        score += Math.random() * 60;
        plans.push({ai:a.i, ti:t.i, score});
      }
    }
    plans.sort((a,b) => b.score - a.score);
    const top = plans.slice(0, Math.min(3, plans.length));
    const pick = top[Math.floor(Math.random() * top.length)];
    if(pick) resolveAttack('enemy', pick.ai, pick.ti);
  }

  function renderDeckEditor(){
    ui.deckCountPill.textContent = `已選 ${state.profile.deck.length} / 6`;
    ui.deckGrid.innerHTML = state.profile.owned.map(card => {
      const selected = state.profile.deck.includes(card.id);
      const sellPrice = Math.max(1, Math.floor((card.base + card.level) / 2));
      return `
        <div class="owned ${selected ? 'sel' : ''}">
          <div class="owned-top">
            <div>
              <div class="owned-role">${card.role}</div>
              <div class="power-big">${cardPower(card)}</div>
            </div>
            <div class="lv">Lv.${card.level}</div>
          </div>
          <div class="owned-btns">
            <button class="tiny-btn" data-toggle="${card.id}">${selected ? '移出牌組' : '加入牌組'}</button>
            <div class="lv">基礎 ${card.base}</div>
          </div>
          ${selected ? '' : `<div class="owned-btns"><button class="tiny-btn" data-sell="${card.id}">賣出 ${sellPrice}</button><div class="lv">倉庫</div></div>`}
        </div>
      `;
    }).join('');

    ui.deckGrid.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.toggle);
        const inDeck = state.profile.deck.includes(id);
        if(inDeck){
          if(state.profile.deck.length <= 1) return;
          state.profile.deck = state.profile.deck.filter(x => x !== id);
        } else {
          if(state.profile.deck.length >= 6) return;
          state.profile.deck.push(id);
        }
        saveProfile();
        refreshMeta();
        renderDeckEditor();
      });
    });

    ui.deckGrid.querySelectorAll('[data-sell]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.sell);
        if(state.profile.deck.includes(id)) return;
        const card = ownedById(id);
        if(!card) return;
        const price = Math.max(1, Math.floor((card.base + card.level) / 2));
        state.profile.gold += price;
        state.profile.owned = state.profile.owned.filter(c => c.id !== id);
        saveProfile();
        refreshMeta();
        renderDeckEditor();
        renderUpgradeEditor();
        showNote(`賣出 ${card.role} +${price} 金幣`);
      });
    });
  }

  function renderUpgradeEditor(){
    ui.upgradeGold.textContent = `金幣 ${state.profile.gold}`;
    ui.upgradeGrid.innerHTML = state.profile.owned.map(card => {
      const cost = card.level * 6;
      return `
        <div class="owned">
          <div class="owned-top">
            <div>
              <div class="owned-role">${card.role}</div>
              <div class="power-big">${cardPower(card)}</div>
            </div>
            <div class="lv">Lv.${card.level}</div>
          </div>
          <div class="owned-btns">
            <button class="tiny-btn" data-up="${card.id}" ${state.profile.gold < cost ? 'disabled' : ''}>升級 ${cost}</button>
            <div class="lv">基礎 ${card.base}</div>
          </div>
        </div>
      `;
    }).join('');

    ui.upgradeGrid.querySelectorAll('[data-up]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.up);
        const card = ownedById(id);
        const cost = card.level * 6;
        if(state.profile.gold < cost) return;
        state.profile.gold -= cost;
        card.level += 1;
        card.base += 1;
        saveProfile();
        refreshMeta();
        renderUpgradeEditor();
        renderDeckEditor();
      });
    });
  }

  $('startBattleBtn').addEventListener('click', startBattle);
  $('editDeckBtn').addEventListener('click', () => { renderDeckEditor(); showOverlay(ui.deckOverlay); });
  $('upgradeBtn').addEventListener('click', () => { renderUpgradeEditor(); showOverlay(ui.upgradeOverlay); });
  $('closeMenuBtn').addEventListener('click', () => { if(state.battle && !state.battle.over) showOverlay(null); });
  $('deckBackBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('upgradeBackBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('rewardMenuBtn').addEventListener('click', () => showOverlay(ui.menuOverlay));
  $('nextStageBtn').addEventListener('click', () => {
    if(ui.rewardTitle.textContent === '獲勝') startBattle();
    else showOverlay(ui.menuOverlay);
  });
  $('menuBtn').addEventListener('click', () => { refreshMeta(); showOverlay(ui.menuOverlay); });
  $('resetBtn').addEventListener('click', () => {
    localStorage.removeItem(saveKey);
    $('versionBadge').textContent = GAME_VERSION;
  loadProfile();
    refreshMeta();
    renderDeckEditor();
    renderUpgradeEditor();
    showNote('進度已重置');
    showOverlay(ui.menuOverlay);
  });

  loadProfile();
  refreshMeta();
  renderDeckEditor();
  renderUpgradeEditor();
})();
</script>
